# ─────────────────────────────────────────────────────────────────────────────
# dependabot.yml — Automated dependency updates
#
# Opens PRs weekly for outdated packages. Limits to 5 open PRs at once.
# Major version bumps for express and zod are ignored — they break the API.
# ─────────────────────────────────────────────────────────────────────────────

version: 2

updates:
  # ── npm dependencies ───────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
    reviewers:
      - kalyankashaboina
    commit-message:
      prefix: 'chore(deps)'
      include: scope
    ignore:
      # Major bumps for required peer deps break user apps — handled manually
      - dependency-name: express
        update-types: ['version-update:semver-major']
      - dependency-name: zod
        update-types: ['version-update:semver-major']
    groups:
      # Group all vitest updates into one PR
      vitest:
        patterns:
          - vitest
          - '@vitest/*'
      # Group all typescript + tsup updates
      build-tools:
        patterns:
          - typescript
          - tsup
          - '@types/*'

  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    reviewers:
      - kalyankashaboina
    commit-message:
      prefix: 'chore(ci)'
