version: 2

updates:
  # npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
    ignore:
      # Only patch updates for zod and express — avoid breaking changes
      - dependency-name: 'zod'
        update-types: ['version-update:semver-major']
      - dependency-name: 'express'
        update-types: ['version-update:semver-major']

  # GitHub Actions versions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    labels:
      - 'dependencies'
      - 'github-actions'
