# ─────────────────────────────────────────────────────────────────────────────
# dependabot.yml — Automated dependency updates
#
# Weekly PRs for outdated packages. auto-merge.yml handles patch/minor.
# Major bumps always need manual review.
# ─────────────────────────────────────────────────────────────────────────────

version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: UTC
    open-pull-requests-limit: 5
    labels: [dependencies]
    reviewers: [kalyankashaboina]
    commit-message:
      prefix: 'chore(deps)'
      include: scope
    ignore:
      - dependency-name: express
        update-types: ['version-update:semver-major']
      - dependency-name: zod
        update-types: ['version-update:semver-major']
      - dependency-name: pino
        update-types: ['version-update:semver-major']
      - dependency-name: pino-pretty
        update-types: ['version-update:semver-major']
    groups:
      vitest:
        patterns: [vitest, '@vitest/*']
      build-tools:
        patterns: [typescript, tsup, '@types/*']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: UTC
    open-pull-requests-limit: 3
    labels: [dependencies, github-actions]
    commit-message:
      prefix: 'chore(ci)'
