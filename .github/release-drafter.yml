# ─────────────────────────────────────────────────────────────────────────────
# .github/release-drafter.yml — Release Drafter configuration
#
# Automatically drafts the next GitHub Release by categorising merged PR titles.
# Used by release-drafter.yml workflow.
#
# PR title convention (enforced by pr-check.yml):
#   feat: <title>    → Features
#   fix: <title>     → Bug Fixes
#   perf: <title>    → Performance
#   docs: <title>    → Documentation
#   chore(deps): ... → Dependency Updates
#   chore(ci): ...   → CI / Build
# ─────────────────────────────────────────────────────────────────────────────

name-template:  'shapeguard v$RESOLVED_VERSION'
tag-template:   'v$RESOLVED_VERSION'

# Auto-bump version based on label on merged PRs
version-resolver:
  major:
    labels: [breaking-change, major]
  minor:
    labels: [enhancement, feature, feat]
  patch:
    labels: [bug, fix, patch, documentation, dependencies]
  default: patch

categories:
  - title: '🚀 Features'
    labels: [enhancement, feature, feat]

  - title: '🐛 Bug Fixes'
    labels: [bug, fix]

  - title: '⚡ Performance'
    labels: [performance, perf]

  - title: '🔒 Security'
    labels: [security]

  - title: '📖 Documentation'
    labels: [documentation, docs]

  - title: '🔧 Maintenance'
    labels: [chore, refactor, dependencies, github-actions]

exclude-labels:
  - skip-changelog
  - wip
  - draft

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
change-title-escapes: '\<*_&'

template: |
  ## What's changed

  $CHANGES

  **Full changelog:** https://github.com/kalyankashaboina/shapeguard/blob/main/CHANGELOG.md
