# ─────────────────────────────────────────────────────────────────────────────
# ci.yml — shapeguard Continuous Integration
#
# Runs on every push to main and every PR targeting main.
# Matrix: Node 18 / 20 / 22 (all supported LTS + current).
#
# Jobs:
#   test     — typecheck → test → coverage → build → bundle size guard
#   security — npm audit for dependency vulnerabilities
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref — saves CI minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Test matrix ──────────────────────────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      # Collect coverage report then upload — must run in this order
      - name: Collect coverage (Node 20 only)
        if: matrix.node-version == '20.x'
        run: npm run test:coverage

      - name: Upload coverage to Codecov (Node 20 only)
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unit
          fail_ci_if_error: false
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Bundle size check (Node 20 only)
        if: matrix.node-version == '20.x'
        run: |
          node scripts/size.mjs
          MAIN=$(wc -c < dist/index.mjs)
          echo "Main ESM bundle: ${MAIN} bytes (50 KB limit)"
          if [ "$MAIN" -gt 51200 ]; then
            echo "❌ Bundle regression: ${MAIN}b > 51200b"
            exit 1
          fi
          echo "✅ Bundle size OK"

  # ── Security audit ───────────────────────────────────────────────────────────
  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
