# ─────────────────────────────────────────────────────────────────────────────
# ci.yml — shapeguard Continuous Integration
#
# Runs on every push to main and every PR targeting main.
# ALL steps must pass — no deployment runs if this fails.
#
# Node matrix: 18.x / 20.x / 22.x
# Jobs:
#   test    — typecheck → lint → tests → coverage → build → bundle guard
#   audit   — npm audit for critical vulnerabilities
#   website — build Docusaurus website (ensures docs don't break on publish)
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Library quality gate ─────────────────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.pull_request.draft != true

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint || true
        # ESLint newly added — reports issues but doesn't block CI until baseline is clean
        # Remove "|| true" once all existing lint warnings are addressed

      - name: Run tests
        run: npm test

      - name: Collect coverage (Node 20 only)
        if: matrix.node-version == '20.x'
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: true
        # continue-on-error: true

      - name: Build library
        run: npm run build

      - name: Bundle size guard (Node 20 only)
        if: matrix.node-version == '20.x'
        run: |
          MAIN=$(wc -c < dist/index.mjs)
          echo "Main ESM: ${MAIN} bytes (50KB limit)"
          if [ "$MAIN" -gt 51200 ]; then
            echo "❌ Bundle regression: ${MAIN}b > 51200b"; exit 1
          fi
          echo "✅ Bundle size OK: ${MAIN} bytes"

      - name: Bundle size summary (PRs only)
        if: matrix.node-version == '20.x' && github.event_name == 'pull_request'
        run: |
          echo "## 📦 Bundle sizes" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in dist/index.mjs dist/index.cjs dist/openapi/index.mjs dist/testing/index.mjs; do
            [ -f "$f" ] && KB=$(echo "scale=1; $(wc -c < $f) / 1024" | bc) && \
              echo "| \`$f\` | ${KB} KB |" >> $GITHUB_STEP_SUMMARY
          done

      - name: CHANGELOG check (PRs only)
        if: matrix.node-version == '20.x' && github.event_name == 'pull_request'
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "CHANGELOG.md"; then
            echo "✅ CHANGELOG.md updated"
          else
            echo "⚠️  CHANGELOG.md not updated — add an entry under [Unreleased] if relevant."
          fi

  # ── Security audit ────────────────────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=critical

  # ── Website build verification ────────────────────────────────────────────────
  # Ensures the Docusaurus site builds cleanly with the current docs.
  # Only runs if website/ directory exists and has a package.json.
  website:
    name: Build website
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.draft != true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Check if website exists
        id: check_website
        run: |
          if [ -f "website/package.json" ]; then
            echo "has_website=true" >> $GITHUB_OUTPUT
          else
            echo "has_website=false" >> $GITHUB_OUTPUT
            echo "⚠️  No website/package.json found — skipping website build"
          fi

      - name: Install website dependencies
        if: steps.check_website.outputs.has_website == 'true'
        run: npm install
        working-directory: website

      - name: Build Docusaurus site
        if: steps.check_website.outputs.has_website == 'true'
        run: npm run build
        working-directory: website
        env:
          NODE_ENV: production

      - name: Verify build output
        if: steps.check_website.outputs.has_website == 'true'
        run: |
          if [ ! -d "website/build" ]; then
            echo "❌ website/build missing — Docusaurus build failed"; exit 1
          fi
          echo "✅ Website build: $(du -sh website/build | cut -f1)"
