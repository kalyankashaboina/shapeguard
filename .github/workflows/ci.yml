# ─────────────────────────────────────────────────────────────────────────────
# ci.yml — shapeguard CI (monorepo)
#
# Jobs:
#   lib      — typecheck → lint (enforced) → tests → coverage → build → bundle guard
#   examples — node scripts/check-examples.mjs  (all 8 from root, no cd)
#   audit    — npm audit --audit-level=critical
#   website  — Docusaurus build
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lib:
    name: Library (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.pull_request.draft != true
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies (single root install)
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck --workspace=packages/shapeguard

      - name: Lint (enforced — no || true)
        run: npm run lint --workspace=packages/shapeguard

      - name: Run tests
        run: npm run test --workspace=packages/shapeguard

      - name: Coverage (Node 20 only)
        if: matrix.node-version == '20.x'
        run: npm run test:coverage --workspace=packages/shapeguard

      - name: Upload coverage
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./packages/shapeguard/coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

      - name: Build
        run: npm run build --workspace=packages/shapeguard

      - name: Bundle size guard (Node 20)
        if: matrix.node-version == '20.x'
        run: |
          ESM=packages/shapeguard/dist/index.mjs
          RAW=$(wc -c < $ESM)
          GZIP=$(gzip -c $ESM | wc -c)
          GZIP_KB=$(echo "scale=1; $GZIP / 1024" | bc)
          echo "ESM raw: ${RAW}b  gzip: ${GZIP}b (${GZIP_KB}KB)"
          if [ "$RAW" -gt 71680 ]; then
            echo "❌ Raw bundle >70KB: $(echo "scale=1; $RAW/1024" | bc)KB"; exit 1; fi
          if [ "$GZIP" -gt 25600 ]; then
            echo "❌ Gzip bundle >25KB: ${GZIP_KB}KB"; exit 1; fi
          echo "✅ Bundle OK: $(echo "scale=1; $RAW/1024" | bc)KB raw / ${GZIP_KB}KB gzipped"

      - name: Bundle sizes (PRs)
        if: matrix.node-version == '20.x' && github.event_name == 'pull_request'
        run: |
          echo "## 📦 Bundle sizes" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in packages/shapeguard/dist/index.mjs \
                   packages/shapeguard/dist/index.cjs \
                   packages/shapeguard/dist/openapi/index.mjs \
                   packages/shapeguard/dist/testing/index.mjs; do
            [ -f "$f" ] && KB=$(echo "scale=1; $(wc -c < $f) / 1024" | bc) && \
              echo "| \`$f\` | ${KB} KB |" >> $GITHUB_STEP_SUMMARY
          done

      - name: CHANGELOG reminder (PRs)
        if: matrix.node-version == '20.x' && github.event_name == 'pull_request'
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -q "packages/shapeguard/CHANGELOG.md" \
            && echo "✅ CHANGELOG.md updated" \
            || echo "⚠️  CHANGELOG.md not updated — add entry under [Unreleased] if relevant."

  examples:
    name: Examples (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.draft != true
    needs: lib
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - name: Install workspace dependencies
        run: npm ci
      - name: Build library (for workspace symlink resolution)
        run: npm run build --workspace=packages/shapeguard
      - name: Check all examples from root
        run: node scripts/check-examples.mjs

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=critical --workspace=packages/shapeguard

  website:
    name: Website build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.draft != true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - name: Build Docusaurus
        run: npm run build --workspace=website
        env:
          NODE_ENV: production
      - name: Verify output
        run: |
          [ -d website/build ] \
            && echo "✅ Website build: $(du -sh website/build | cut -f1)" \
            || (echo "❌ website/build missing"; exit 1)
