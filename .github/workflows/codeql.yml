# ─────────────────────────────────────────────────────────────────────────────
# codeql.yml — GitHub CodeQL Security Analysis
#
# Runs on push to main, PRs, and weekly.
# Results appear in Security → Code scanning tab.
#
# To improve the OpenSSF Scorecard score (currently ~60):
#   - Enable branch protection on main in GitHub settings
#   - Require PR reviews before merging
#   - This workflow contributes to the SAST check
# ─────────────────────────────────────────────────────────────────────────────

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

permissions:
  actions:         read
  contents:        read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - run: npm ci

      - uses: github/codeql-action/init@v3
        with:
          languages: typescript
          queries: security-and-quality
          config: |
            paths-ignore:
              - examples/**
              - dist/**

      - run: npm run build

      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:typescript
