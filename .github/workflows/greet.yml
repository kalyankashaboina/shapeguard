# ─────────────────────────────────────────────────────────────────────────────
# greet.yml — Welcome first-time contributors
#
# Sends a friendly message when someone opens their first issue or PR.
# Makes contributors feel welcome and points them to the right resources.
# ─────────────────────────────────────────────────────────────────────────────

name: Greet new contributors

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues:        write
  pull-requests: write

jobs:
  greet:
    name: Welcome first-time contributor
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          issue-message: |
            👋 Hey @${{ github.actor }}, thanks for opening your first issue on shapeguard!

            To help us resolve this quickly, please make sure you've included:
            - A minimal code example that reproduces the issue
            - Your shapeguard version (`npm ls shapeguard`)
            - Your Node.js version (`node --version`)

            **Resources:**
            - 📖 [Documentation](https://github.com/kalyankashaboina/shapeguard/tree/main/docs)
            - 📋 [CHANGELOG](https://github.com/kalyankashaboina/shapeguard/blob/main/CHANGELOG.md)
            - 🔒 [Security Policy](https://github.com/kalyankashaboina/shapeguard/blob/main/SECURITY.md) — for vulnerabilities, please email instead of opening an issue

          pr-message: |
            👋 Hey @${{ github.actor }}, thanks for your first pull request to shapeguard!

            Before we can review, please make sure:
            - [ ] `npm run typecheck` passes
            - [ ] `npm test` passes
            - [ ] `CHANGELOG.md` is updated under `[Unreleased]`
            - [ ] Tests cover the change

            We'll review your PR as soon as we can. Thanks for contributing! 🚀
