# ─────────────────────────────────────────────────────────────────────────────
# lock.yml — Lock closed issues and PRs after inactivity
#
# After an issue/PR has been closed for 30 days with no new comments,
# lock it to prevent spam and off-topic comments.
# Runs weekly to avoid hitting API rate limits.
# ─────────────────────────────────────────────────────────────────────────────

name: Lock closed issues and PRs

on:
  schedule:
    - cron: '0 5 * * 1'   # weekly Monday 5am UTC
  workflow_dispatch:

permissions:
  issues:        write
  pull-requests: write

jobs:
  lock:
    name: Lock stale closed threads
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: dessant/lock-threads@v6
        with:
          github-token:           ${{ secrets.GITHUB_TOKEN }}
          issue-inactive-days:    30
          pr-inactive-days:       30
          issue-lock-reason:      resolved
          pr-lock-reason:         resolved
          issue-comment:          >
            This issue has been closed for 30 days and is now locked.
            If you have a related issue or a new question, please open a new issue.
          pr-comment:             >
            This PR has been closed for 30 days and is now locked.
            If you'd like to continue this work, please open a new PR.
          log-output:             true
