# ─────────────────────────────────────────────────────────────────────────────
# pr-check.yml — shapeguard Pull Request Quality Gate
#
# Runs on every PR targeting main.
# Stricter than CI — requires typecheck, tests, build, and size check.
# A PR cannot be merged unless this passes.
# ─────────────────────────────────────────────────────────────────────────────

name: PR Quality Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # for posting size diff comment

jobs:
  quality:
    name: Quality Gate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.pull_request.draft == false

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for accurate diff

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Test coverage (Node 20 only)
        if: matrix.node-version == '20.x'
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Bundle size report (Node 20 only)
        if: matrix.node-version == '20.x'
        run: |
          echo "## Bundle sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in dist/index.mjs dist/index.cjs dist/openapi/index.mjs dist/testing/index.mjs; do
            SIZE=$(wc -c < "$f" 2>/dev/null || echo 0)
            KB=$(echo "scale=1; $SIZE / 1024" | bc)
            echo "| \`$f\` | ${KB} KB |" >> $GITHUB_STEP_SUMMARY
          done

          # Guard against main bundle regression
          MAIN_SIZE=$(wc -c < dist/index.mjs)
          if [ "$MAIN_SIZE" -gt 51200 ]; then
            echo "❌ Main bundle ${MAIN_SIZE} bytes exceeds 50KB limit" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ Bundle size within limit" >> $GITHUB_STEP_SUMMARY

  changelog:
    name: Changelog check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG updated
        run: |
          # Warn (not fail) if CHANGELOG.md was not touched in this PR
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "CHANGELOG.md"; then
            echo "✅ CHANGELOG.md updated"
          else
            echo "⚠️  CHANGELOG.md was not updated in this PR."
            echo "    If this is a bug fix or feature, please add an entry under [Unreleased]."
          fi
