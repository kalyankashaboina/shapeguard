# ─────────────────────────────────────────────────────────────────────────────
# release-drafter.yml — Auto-draft GitHub Release notes from merged PRs
#
# Every time a PR is merged to main, this updates the draft for the next release.
# When you're ready to release, just publish the draft.
# ─────────────────────────────────────────────────────────────────────────────

name: Release Drafter

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents:      write
  pull-requests: write

jobs:
  draft:
    name: Update release draft
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
