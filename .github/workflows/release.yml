# ─────────────────────────────────────────────────────────────────────────────
# release.yml — shapeguard Automated Release
#
# Triggered by pushing a version tag: git tag v0.8.0 && git push --tags
#
# Flow:
#   1. Validate tag matches package.json version
#   2. Run full test suite + build
#   3. Publish to npm
#   4. Create GitHub Release with changelog excerpt
#   5. Post release summary to job summary
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'        # v0.8.0, v1.0.0, etc.
      - 'v[0-9]+.[0-9]+.[0-9]+-*'      # v1.0.0-rc.1 (pre-releases)

permissions:
  contents: write    # create GitHub release
  id-token: write    # npm provenance (supply chain security)

jobs:
  release:
    name: Build, Test & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog extraction

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Validate tag matches package.json version ──────────────────────────
      - name: Validate version consistency
        run: |
          TAG="${GITHUB_REF_NAME#v}"       # strip leading 'v': v0.8.0 → 0.8.0
          PKG=$(node -p "require('./package.json').version")
          echo "Tag version:     $TAG"
          echo "package.json:    $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "❌ Tag ($TAG) does not match package.json version ($PKG)"
            echo "   Update package.json version before tagging."
            exit 1
          fi
          echo "✅ Version consistent: $TAG"

      # ── Full quality gate ─────────────────────────────────────────────────
      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          for f in dist/index.mjs dist/index.cjs dist/index.d.ts \
                   dist/openapi/index.mjs dist/openapi/index.cjs \
                   dist/testing/index.mjs dist/testing/index.cjs; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing expected dist file: $f"
              exit 1
            fi
            echo "✅ $f ($(wc -c < $f) bytes)"
          done

      # ── Extract changelog for this version ───────────────────────────────
      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract block between this version header and the next version header
          NOTES=$(awk "/^## \[$VERSION\]/,/^## \[/" CHANGELOG.md \
            | grep -v "^## \[" | head -100)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](./CHANGELOG.md) for details."
          fi
          # Write to file to avoid multiline env var issues
          echo "$NOTES" > /tmp/release-notes.md
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ── Publish to npm with provenance ───────────────────────────────────
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: shapeguard v${{ steps.changelog.outputs.version }}
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Job summary ───────────────────────────────────────────────────────
      - name: Release summary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "## 🚀 Released shapeguard v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **npm** | https://www.npmjs.com/package/shapeguard/v/${VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| **changelog** | [CHANGELOG.md](./CHANGELOG.md) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "npm install shapeguard@${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
