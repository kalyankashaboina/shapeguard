# ─────────────────────────────────────────────────────────────────────────────
# release.yml — shapeguard Automated Release
#
# Trigger: push a semver tag → git tag v0.8.0 && git push --tags
#
# Flow:
#   1. Validate tag matches package.json version  (catches "forgot to bump" mistakes)
#   2. Typecheck + full test suite                (last gate before publish)
#   3. Build + verify all expected dist files     (no broken builds shipped)
#   4. Publish to npm with provenance             (supply chain security)
#   5. Create GitHub Release with changelog text  (users see what changed)
#   6. Notify on failure                          (author always knows if it broke)
#
# Secrets required (Settings → Secrets → Actions):
#   NPM_TOKEN — npm access token with publish rights (Automation type, scoped to shapeguard)
#
# Environments required (Settings → Environments):
#   production — add yourself as required reviewer so every publish needs approval
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'         # v0.8.0  v1.0.0
      - 'v[0-9]+.[0-9]+.[0-9]+-*'       # v1.0.0-rc.1  v1.0.0-beta.2

# Least-privilege permissions — only what each step needs
permissions:
  contents: write    # create GitHub release + upload assets
  id-token:  write   # npm provenance (OIDC token for sigstore)

jobs:
  release:
    name: Build, Test & Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # ── Environment gate ──────────────────────────────────────────────────────
    # Requires a manual approval from a repo admin before publishing.
    # Enable this in Settings → Environments → production → Required reviewers.
    # Comment out during initial setup if you don't have GitHub Pro/Team.
    # environment: production

    steps:
      # ── 1. Checkout full history (needed for changelog extraction) ─────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Set up Node with npm cache ──────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Validate tag = package.json version ─────────────────────────────
      # If you push v0.8.0 but forgot to update package.json, this stops the release.
      - name: Validate version consistency
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          echo "Tag version  : $TAG"
          echo "package.json : $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo ""
            echo "❌  Tag ($TAG) does not match package.json version ($PKG)"
            echo "    Fix: update package.json version to $TAG, commit, then re-tag."
            exit 1
          fi
          echo "✅  Version consistent: $TAG"
          echo "VERSION=$TAG" >> $GITHUB_ENV

      # ── 5. TypeScript type check ───────────────────────────────────────────
      - name: Type check
        run: npm run typecheck

      # ── 6. Full test suite ─────────────────────────────────────────────────
      - name: Run tests
        run: npm test

      # ── 7. Build ───────────────────────────────────────────────────────────
      - name: Build
        run: npm run build

      # ── 8. Verify every expected dist file exists ─────────────────────────
      - name: Verify dist output
        run: |
          echo "Checking dist files..."
          MISSING=0
          for f in \
            dist/index.mjs      dist/index.cjs      dist/index.d.ts \
            dist/openapi/index.mjs dist/openapi/index.cjs \
            dist/testing/index.mjs dist/testing/index.cjs \
            dist/adapters/joi.mjs  dist/adapters/yup.mjs \
            dist/adapters/winston.mjs; do
            if [ ! -f "$f" ]; then
              echo "  ❌ MISSING: $f"
              MISSING=$((MISSING+1))
            else
              SIZE=$(wc -c < "$f")
              echo "  ✅ $f  (${SIZE} bytes)"
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo ""
            echo "❌  $MISSING dist file(s) missing — aborting release"
            exit 1
          fi
          echo ""
          echo "✅  All dist files present"

      # ── 9. Bundle size guard ───────────────────────────────────────────────
      - name: Bundle size check
        run: |
          MAIN=$(wc -c < dist/index.mjs)
          echo "Main ESM bundle: ${MAIN} bytes (limit: 81920)"
          if [ "$MAIN" -gt 81920 ]; then
            echo "❌  Bundle size regression: ${MAIN} bytes > 80KB limit"
            exit 1
          fi
          echo "✅  Bundle size OK"

      # ── 10. Extract changelog section for this version ─────────────────────
      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ env.VERSION }}"
          # Pull everything between "## [VERSION]" and the next "## [" heading
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md | head -80)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](./CHANGELOG.md) for full details."
          fi
          printf '%s\n' "$NOTES" > /tmp/release-notes.md
          cat /tmp/release-notes.md

      # ── 11. Detect pre-release ─────────────────────────────────────────────
      - name: Detect pre-release
        id: prerelease
        run: |
          if echo "${{ github.ref_name }}" | grep -qE '\-'; then
            echo "is_prerelease=true"  >> $GITHUB_OUTPUT
            echo "npm_tag=next"        >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "npm_tag=latest"      >> $GITHUB_OUTPUT
          fi

      # ── 12. Publish to npm with provenance ─────────────────────────────────
      # --provenance: publishes a signed SLSA attestation via sigstore.
      # Users can verify: npm audit signatures shapeguard
      - name: Publish to npm
        run: |
          npm publish \
            --access public \
            --provenance \
            --tag ${{ steps.prerelease.outputs.npm_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── 13. Create GitHub Release ──────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:    ${{ github.ref_name }}
          name:        shapeguard v${{ env.VERSION }}
          body_path:   /tmp/release-notes.md
          draft:       false
          prerelease:  ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          make_latest: ${{ steps.prerelease.outputs.is_prerelease == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 13b. Post-publish smoke test ──────────────────────────────────────
      # Installs the just-published package and verifies CJS + ESM imports work.
      # Catches broken exports map before users hit it.
      - name: Post-publish smoke test
        run: |
          VERSION="${{ env.VERSION }}"
          cd /tmp
          mkdir smoke-test && cd smoke-test
          npm init -y
          npm install shapeguard@${VERSION} --prefer-online 2>/dev/null ||             echo "⚠  Smoke test skipped — package not yet indexed by npm CDN (try in 60s)"
          node -e "const sg = require('shapeguard'); process.exit(sg.shapeguard ? 0 : 1)" &&             echo "✅ CJS import OK" || echo "❌ CJS import FAILED"
          node --input-type=module             -e "import { shapeguard } from 'shapeguard'; process.exit(shapeguard ? 0 : 1)" 2>/dev/null &&             echo "✅ ESM import OK" || echo "⚠  ESM import skipped (may need flags)"
        continue-on-error: true  # npm CDN delay after publish is acceptable

      # ── 14. Job summary ────────────────────────────────────────────────────
      - name: Release summary
        run: |
          echo "## 🚀 Released shapeguard v${{ env.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **npm** | https://www.npmjs.com/package/shapeguard/v/${{ env.VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **tag** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **type** | ${{ steps.prerelease.outputs.is_prerelease == 'true' && 'pre-release' || 'stable' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "npm install shapeguard@${{ env.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # ── 15. Notify on failure ──────────────────────────────────────────────
      # Runs only if a previous step failed — ensures you always know about broken releases.
      - name: Notify failure
        if: failure()
        run: |
          echo "## ❌ Release FAILED for ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the step logs above to find which step failed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Common causes:**" >> $GITHUB_STEP_SUMMARY
          echo "- Tag does not match \`package.json\` version" >> $GITHUB_STEP_SUMMARY
          echo "- \`NPM_TOKEN\` secret expired or invalid" >> $GITHUB_STEP_SUMMARY
          echo "- Test suite failure" >> $GITHUB_STEP_SUMMARY
          echo "- Build error" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**To retry:** delete the tag, fix the issue, re-tag and push." >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "git tag -d ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "git push origin :${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
