# ─────────────────────────────────────────────────────────────────────────────
# stale.yml — Stale issue and PR management
#
# Runs weekly (not daily — daily is noisy and unnecessary).
# Security issues are never marked stale.
# ─────────────────────────────────────────────────────────────────────────────

name: Stale Issue Management

on:
  schedule:
    - cron: '0 9 * * 1'   # every Monday at 9am UTC (weekly, not daily)
  workflow_dispatch:        # allow manual trigger from Actions tab

permissions:
  issues:        write
  pull-requests: write

jobs:
  stale:
    name: Mark stale issues and PRs
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/stale@v9
        with:
          # ── Issues ──────────────────────────────────────────────────────────
          days-before-issue-stale: 60
          days-before-issue-close: 14    # 2 weeks to respond after stale notice
          stale-issue-label: stale
          stale-issue-message: |
            👋 This issue has been inactive for 60 days.

            It will be closed in 14 days unless there is new activity.
            If this is still relevant, please:
            - Leave a comment confirming it still affects you
            - Link to a minimal reproduction
            - Or submit a PR with a fix

            Thank you for helping keep the issue tracker useful!
          close-issue-message: |
            Closing due to inactivity. Feel free to reopen if this is still relevant.
            If you have a reproduction, please include it when reopening.
          # Never stale: security issues, bugs, high-priority, pinned
          exempt-issue-labels: pinned,security,bug,p0,p1,confirmed

          # ── Pull Requests ────────────────────────────────────────────────────
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: stale
          stale-pr-message: |
            👋 This PR has been inactive for 30 days.

            It will be closed in 14 days unless there is new activity.
            To keep this open, please:
            - Rebase onto main if there are conflicts
            - Address any review comments
            - Leave a comment if you need help

            Thank you for contributing!
          close-pr-message: |
            Closing due to inactivity. The work is appreciated — feel free to reopen
            or create a new PR if you'd like to continue.
          exempt-pr-labels: pinned,security,do-not-close

          # ── Limits ────────────────────────────────────────────────────────────
          operations-per-run: 100
          remove-stale-when-updated: true
          delete-branch: false
