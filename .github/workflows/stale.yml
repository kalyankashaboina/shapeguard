name: Mark Stale Issues and PRs

on:
  schedule:
    - cron: '0 9 * * *'   # runs every day at 9am

jobs:
  stale:
    name: Close Stale Issues & PRs
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v10
        with:
          # Issues
          stale-issue-message: >
            This issue has been inactive for 60 days with no activity.
            It will be closed in 7 days unless there is new activity.
            If this is still relevant, please leave a comment!
          close-issue-message: >
            Closed due to inactivity. Feel free to reopen if this is still relevant.
          days-before-issue-stale: 60
          days-before-issue-close: 7
          stale-issue-label: 'stale'
          exempt-issue-labels: 'pinned,security,bug,enhancement'

          # Pull Requests
          stale-pr-message: >
            This PR has been inactive for 30 days.
            It will be closed in 7 days unless there is new activity.
            Please rebase and update if you'd like to continue!
          close-pr-message: >
            Closed due to inactivity. Feel free to reopen if you'd like to continue.
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          exempt-pr-labels: 'pinned,security'
