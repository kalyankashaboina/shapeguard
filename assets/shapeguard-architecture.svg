<svg width="720" height="520" viewBox="0 0 720 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="720" height="520" rx="14" fill="#0D1117"/>
  <defs>
    <marker id="ok" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#0F6E56"/></marker>
    <marker id="err" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#CC3333"/></marker>
  </defs>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#E8F5F0">shapeguard — request lifecycle</text>

  <!-- Left spine: happy path -->
  <!-- HTTP IN -->
  <text x="32" y="74" font-size="10" fill="#7DF0C0">HTTP Request</text>
  <line x1="108" y1="70" x2="178" y2="70" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#ok)"/>

  <!-- Box helper -->
  <!-- shapeguard() -->
  <rect x="180" y="54" width="176" height="32" rx="7" fill="#0F6E56"/>
  <text x="268" y="71" text-anchor="middle" font-size="11" font-weight="600" fill="#FFF">shapeguard()</text>
  <text x="268" y="83" text-anchor="middle" font-size="9" fill="#B8F5E5">requestId · logging · res helpers</text>
  <line x1="268" y1="86" x2="268" y2="110" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#ok)"/>

  <!-- rateLimit check -->
  <rect x="180" y="112" width="176" height="32" rx="7" fill="#1A3A6A"/>
  <text x="268" y="129" text-anchor="middle" font-size="11" font-weight="600" fill="#FFF">rateLimit check</text>
  <text x="268" y="141" text-anchor="middle" font-size="9" fill="#90C8FF">per-IP · pluggable store</text>
  <line x1="356" y1="128" x2="430" y2="128" stroke="#CC3333" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#err)"/>
  <text x="390" y="122" text-anchor="middle" font-size="8" fill="#CC3333">429</text>
  <line x1="268" y1="144" x2="268" y2="168" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#ok)"/>

  <!-- cache header -->
  <rect x="180" y="170" width="176" height="32" rx="7" fill="#1A3040"/>
  <text x="268" y="187" text-anchor="middle" font-size="11" font-weight="600" fill="#FFF">cache headers set</text>
  <text x="268" y="199" text-anchor="middle" font-size="9" fill="#90D8FF">Cache-Control: max-age=60</text>
  <line x1="268" y1="202" x2="268" y2="226" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#ok)"/>

  <!-- pre-parse guards -->
  <rect x="180" y="228" width="176" height="32" rx="7" fill="#2A1A40"/>
  <text x="268" y="245" text-anchor="middle" font-size="11" font-weight="600" fill="#FFF">pre-parse guards</text>
  <text x="268" y="257" text-anchor="middle" font-size="9" fill="#D4A8FF">depth · size · proto pollution</text>
  <line x1="356" y1="244" x2="430" y2="244" stroke="#CC3333" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#err)"/>
  <text x="390" y="238" text-anchor="middle" font-size="8" fill="#CC3333">400/415</text>
  <line x1="268" y1="260" x2="268" y2="284" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#ok)"/>

  <!-- schema validation -->
  <rect x="180" y="286" width="176" height="32" rx="7" fill="#1A2A40"/>
  <text x="268" y="303" text-anchor="middle" font-size="11" font-weight="600" fill="#FFF">schema validation</text>
  <text x="268" y="315" text-anchor="middle" font-size="9" fill="#90C8FF">Zod / Joi / Yup · typed req.body</text>
  <line x1="356" y1="302" x2="430" y2="302" stroke="#CC3333" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#err)"/>
  <text x="390" y="296" text-anchor="middle" font-size="8" fill="#CC3333">422</text>
  <line x1="268" y1="318" x2="268" y2="342" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#ok)"/>

  <!-- transform -->
  <rect x="180" y="344" width="176" height="32" rx="7" fill="#2A1A10"/>
  <text x="268" y="361" text-anchor="middle" font-size="11" font-weight="600" fill="#FFF">transform()</text>
  <text x="268" y="373" text-anchor="middle" font-size="9" fill="#FFD890">hash · normalise · enrich</text>
  <line x1="268" y1="376" x2="268" y2="400" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#ok)"/>

  <!-- handler -->
  <rect x="180" y="402" width="176" height="32" rx="7" fill="#0A2A0A"/>
  <text x="268" y="419" text-anchor="middle" font-size="11" font-weight="600" fill="#FFF">your handler</text>
  <text x="268" y="431" text-anchor="middle" font-size="9" fill="#90FF90">req.body — fully typed + clean</text>
  <line x1="356" y1="418" x2="430" y2="418" stroke="#CC3333" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#err)"/>
  <text x="390" y="412" text-anchor="middle" font-size="8" fill="#CC3333">AppError</text>
  <line x1="268" y1="434" x2="268" y2="458" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#ok)"/>

  <!-- response strip -->
  <rect x="180" y="460" width="176" height="32" rx="7" fill="#0F6E56"/>
  <text x="268" y="477" text-anchor="middle" font-size="11" font-weight="600" fill="#FFF">response schema strip</text>
  <text x="268" y="489" text-anchor="middle" font-size="9" fill="#B8F5E5">passwordHash removed automatically</text>
  <line x1="268" y1="492" x2="268" y2="510" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#ok)"/>
  <text x="268" y="520" text-anchor="middle" font-size="10" font-weight="600" fill="#7DF0C0">200 { success, data }</text>

  <!-- Error handler box on right -->
  <rect x="432" y="110" width="258" height="330" rx="10" fill="#1A0808" stroke="#CC3333" stroke-width="1"/>
  <rect x="432" y="110" width="258" height="28" rx="10" fill="#CC3333"/>
  <rect x="432" y="124" width="258" height="14" fill="#CC3333"/>
  <text x="561" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#FFF">errorHandler() — always last</text>
  <text x="448" y="158" font-size="9" fill="#FFB8B8">AppError (operational)</text>
  <text x="460" y="172" font-size="9" fill="#888">→ shows your message to client</text>
  <text x="448" y="192" font-size="9" fill="#FFB8B8">Other Error (programmer)</text>
  <text x="460" y="206" font-size="9" fill="#888">→ hides details in production</text>
  <text x="448" y="226" font-size="9" fill="#FFB8B8">Always same response shape:</text>
  <rect x="448" y="234" width="228" height="68" rx="6" fill="#0D0808" stroke="#882222"/>
  <text x="460" y="250" font-size="8" fill="#FF9090" font-family="monospace">{"success": false,</text>
  <text x="460" y="264" font-size="8" fill="#FF9090" font-family="monospace"> "message": "...",</text>
  <text x="460" y="278" font-size="8" fill="#FF9090" font-family="monospace"> "error": {</text>
  <text x="460" y="292" font-size="8" fill="#FF9090" font-family="monospace">   "code": "NOT_FOUND", "details": {}}}</text>
  <text x="448" y="320" font-size="9" fill="#FFB8B8">4xx errors → warn log</text>
  <text x="448" y="336" font-size="9" fill="#FFB8B8">5xx errors → error log</text>
  <text x="448" y="352" font-size="9" fill="#FFB8B8">onError hook for Sentry/Datadog</text>
  <text x="448" y="372" font-size="9" fill="#FFB8B8">Redacts passwords, tokens, cookies</text>
  <text x="448" y="392" font-size="9" fill="#FFB8B8">from logs automatically</text>
  <text x="448" y="424" font-size="9" fill="#884444">Always mount as last middleware</text>
</svg>
