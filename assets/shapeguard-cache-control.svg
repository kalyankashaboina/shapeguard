<svg width="920" height="210" viewBox="0 0 920 210" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect width="920" height="210" fill="url(#bg)" rx="14"/>
  <rect width="920" height="210" fill="none" stroke="#21262d" stroke-width="1" rx="14"/>

  <text x="460" y="28" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="500" fill="#8b949e" letter-spacing="2">CACHE-CONTROL — declared in defineRoute(), set before handler runs</text>

  <!-- card 1: public -->
  <rect x="32" y="44" width="272" height="148" rx="10" fill="#0d1f38" stroke="#388bfd" stroke-width="1"/>
  <rect x="32" y="44" width="272" height="3" rx="2" fill="#388bfd"/>
  <text x="168" y="66" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="700" fill="#79c0ff">Public / CDN cache</text>
  <rect x="48" y="76" width="240" height="64" rx="6" fill="#010409" stroke="#21262d" stroke-width="0.5"/>
  <circle cx="64" cy="90" r="4" fill="#f85149"/><circle cx="78" cy="90" r="4" fill="#e3b341"/><circle cx="92" cy="90" r="4" fill="#3fb950"/>
  <text x="48" y="108" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#6e7681">  defineRoute({</text>
  <text x="48" y="124" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#79c0ff">    cache: { maxAge: 60 }</text>
  <text x="48" y="136" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#6e7681">  })</text>
  <text x="168" y="158" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">Cache-Control:</text>
  <text x="168" y="174" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="600" fill="#79c0ff">public, max-age=60</text>
  <text x="168" y="188" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">CDN + browser cache</text>

  <!-- card 2: private -->
  <rect x="324" y="44" width="272" height="148" rx="10" fill="#1a0e2e" stroke="#8957e5" stroke-width="1"/>
  <rect x="324" y="44" width="272" height="3" rx="2" fill="#8957e5"/>
  <text x="460" y="66" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="700" fill="#d2a8ff">Private / user-specific</text>
  <rect x="340" y="76" width="240" height="64" rx="6" fill="#010409" stroke="#21262d" stroke-width="0.5"/>
  <circle cx="356" cy="90" r="4" fill="#f85149"/><circle cx="370" cy="90" r="4" fill="#e3b341"/><circle cx="384" cy="90" r="4" fill="#3fb950"/>
  <text x="340" y="108" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#6e7681">  defineRoute({</text>
  <text x="340" y="124" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#d2a8ff">    cache: { maxAge: 300, private: true }</text>
  <text x="340" y="136" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#6e7681">  })</text>
  <text x="460" y="158" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">Cache-Control:</text>
  <text x="460" y="174" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="600" fill="#d2a8ff">private, max-age=300</text>
  <text x="460" y="188" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">browser only, not CDN</text>

  <!-- card 3: no-store -->
  <rect x="616" y="44" width="272" height="148" rx="10" fill="#1c0808" stroke="#f85149" stroke-width="1"/>
  <rect x="616" y="44" width="272" height="3" rx="2" fill="#f85149"/>
  <text x="752" y="66" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="700" fill="#ff7b72">Never cache</text>
  <rect x="632" y="76" width="240" height="64" rx="6" fill="#010409" stroke="#21262d" stroke-width="0.5"/>
  <circle cx="648" cy="90" r="4" fill="#f85149"/><circle cx="662" cy="90" r="4" fill="#e3b341"/><circle cx="676" cy="90" r="4" fill="#3fb950"/>
  <text x="632" y="108" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#6e7681">  defineRoute({</text>
  <text x="632" y="124" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#ff7b72">    cache: { maxAge: 0, noStore: true }</text>
  <text x="632" y="136" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#6e7681">  })</text>
  <text x="752" y="158" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">Cache-Control:</text>
  <text x="752" y="174" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="600" fill="#ff7b72">no-store</text>
  <text x="752" y="188" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">payments · sensitive data</text>

  <text x="460" y="204" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">Header is set BEFORE your handler runs — correct even if the handler throws</text>
</svg>
