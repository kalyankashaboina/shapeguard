<svg width="680" height="560" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">

  <!-- Title bar -->
  <rect x="20" y="16" width="640" height="44" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="43" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">shapeguard — what it bundles in one package</text>

  <!-- Feature boxes row 1 - purple -->
  <rect x="20" y="74" width="200" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="120" y="95" text-anchor="middle" font-size="13" font-weight="600" fill="#3C3489">Zod validation</text>
  <text x="120" y="114" text-anchor="middle" font-size="11" fill="#534AB7">body/params/query typed</text>

  <rect x="240" y="74" width="200" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="95" text-anchor="middle" font-size="13" font-weight="600" fill="#3C3489">Response shaping</text>
  <text x="340" y="114" text-anchor="middle" font-size="11" fill="#534AB7">strips passwordHash etc.</text>

  <rect x="460" y="74" width="200" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="560" y="95" text-anchor="middle" font-size="13" font-weight="600" fill="#3C3489">AppError</text>
  <text x="560" y="114" text-anchor="middle" font-size="11" fill="#534AB7">consistent error shapes</text>

  <!-- Feature boxes row 2 - blue -->
  <rect x="20" y="140" width="200" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="120" y="161" text-anchor="middle" font-size="13" font-weight="600" fill="#0C447C">Structured logging</text>
  <text x="120" y="180" text-anchor="middle" font-size="11" fill="#185FA5">pino, requestId, redaction</text>

  <rect x="240" y="140" width="200" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="161" text-anchor="middle" font-size="13" font-weight="600" fill="#0C447C">asyncHandler</text>
  <text x="340" y="180" text-anchor="middle" font-size="11" fill="#185FA5">no unhandled rejections</text>

  <rect x="460" y="140" width="200" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="560" y="161" text-anchor="middle" font-size="13" font-weight="600" fill="#0C447C">Security defaults</text>
  <text x="560" y="180" text-anchor="middle" font-size="11" fill="#185FA5">proto pollution, DoS guards</text>

  <!-- Divider label -->
  <rect x="20" y="210" width="640" height="40" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="234" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">vs doing it manually (what shapeguard replaces)</text>

  <!-- Manual column header -->
  <rect x="20" y="264" width="300" height="34" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text x="170" y="285" text-anchor="middle" font-size="13" font-weight="600" fill="#712B13">Without shapeguard</text>

  <!-- Manual rows -->
  <rect x="20" y="306" width="300" height="28" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text x="170" y="324" text-anchor="middle" font-size="11" fill="#993C1D">zod + manual parse in every route</text>

  <rect x="20" y="342" width="300" height="28" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text x="170" y="360" text-anchor="middle" font-size="11" fill="#993C1D">custom error handler per project</text>

  <rect x="20" y="378" width="300" height="28" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text x="170" y="396" text-anchor="middle" font-size="11" fill="#993C1D">manually strip sensitive fields</text>

  <rect x="20" y="414" width="300" height="28" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text x="170" y="432" text-anchor="middle" font-size="11" fill="#993C1D">try/catch in every async handler</text>

  <rect x="20" y="450" width="300" height="28" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text x="170" y="468" text-anchor="middle" font-size="11" fill="#993C1D">setup pino + requestId yourself</text>

  <!-- shapeguard column header -->
  <rect x="360" y="264" width="300" height="34" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="510" y="285" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">With shapeguard</text>

  <!-- shapeguard rows -->
  <rect x="360" y="306" width="300" height="28" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="510" y="324" text-anchor="middle" font-size="11" fill="#085041">validate() — one line per route</text>

  <rect x="360" y="342" width="300" height="28" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="510" y="360" text-anchor="middle" font-size="11" fill="#085041">errorHandler() — once in app.ts</text>

  <rect x="360" y="378" width="300" height="28" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="510" y="396" text-anchor="middle" font-size="11" fill="#085041">response schema strips it auto</text>

  <rect x="360" y="414" width="300" height="28" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="510" y="432" text-anchor="middle" font-size="11" fill="#085041">asyncHandler() wraps it</text>

  <rect x="360" y="450" width="300" height="28" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="510" y="468" text-anchor="middle" font-size="11" fill="#085041">shapeguard() mounts it all</text>

  <!-- Bottom badges -->
  <rect x="20" y="496" width="200" height="36" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="120" y="518" text-anchor="middle" font-size="13" font-weight="600" fill="#27500A">~12kb gzip core</text>

  <rect x="240" y="496" width="200" height="36" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="518" text-anchor="middle" font-size="13" font-weight="600" fill="#633806">TS + JS support</text>

  <rect x="460" y="496" width="200" height="36" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="560" y="518" text-anchor="middle" font-size="13" font-weight="600" fill="#0C447C">MIT license</text>

</svg>
