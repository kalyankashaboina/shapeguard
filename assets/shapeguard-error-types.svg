<svg width="920" height="260" viewBox="0 0 920 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect width="920" height="260" fill="url(#bg)" rx="14"/>
  <rect width="920" height="260" fill="none" stroke="#21262d" stroke-width="1" rx="14"/>

  <text x="460" y="30" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="500" fill="#8b949e" letter-spacing="2">TWO TYPES OF ERRORS</text>

  <!-- LEFT panel: operational -->
  <rect x="32" y="44" width="418" height="200" rx="10" fill="#1c1105" stroke="#d29922" stroke-width="1"/>
  <rect x="32" y="44" width="418" height="3" rx="2" fill="#d29922"/>

  <text x="55" y="68" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700" fill="#e3b341">Operational</text>
  <text x="165" y="68" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#8b949e">— expected, throw AppError</text>

  <!-- examples -->
  <text x="55" y="92" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#f0883e">throw AppError.notFound('User')</text>
  <text x="55" y="108" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#f0883e">throw AppError.conflict('Email')</text>
  <text x="55" y="124" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#f0883e">throw AppError.unauthorized()</text>
  <text x="55" y="140" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#f0883e">throw AppError.custom('BANNED', ...)</text>

  <!-- divider -->
  <line x1="52" y1="155" x2="432" y2="155" stroke="#30363d" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- outcome -->
  <rect x="52" y="163" width="380" height="68" rx="8" fill="#161b22" stroke="#d29922" stroke-width="0.5"/>
  <text x="242" y="182" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="600" fill="#e3b341">Client sees YOUR message</text>
  <text x="242" y="198" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">4xx status  ·  logger.warn (low noise)</text>
  <text x="242" y="214" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">client can act on it</text>
  <text x="242" y="228" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#3fb950">✓ DB error never leaks</text>

  <!-- RIGHT panel: programmer -->
  <rect x="470" y="44" width="418" height="200" rx="10" fill="#0e1c0e" stroke="#3fb950" stroke-width="1"/>
  <rect x="470" y="44" width="418" height="3" rx="2" fill="#3fb950"/>

  <text x="493" y="68" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700" fill="#56d364">Programmer</text>
  <text x="603" y="68" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#8b949e">— unexpected, any throw</text>

  <text x="493" y="92" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#7ee787">throw new Error('...')</text>
  <text x="493" y="108" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#7ee787">undefined.id   ← null pointer</text>
  <text x="493" y="124" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#7ee787">DB connection dropped</text>
  <text x="493" y="140" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#7ee787">throw null / throw 'string'</text>

  <line x1="490" y1="155" x2="870" y2="155" stroke="#30363d" stroke-width="1" stroke-dasharray="4 3"/>

  <rect x="490" y="163" width="380" height="68" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="0.5"/>
  <text x="680" y="182" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="600" fill="#56d364">Client sees "Something went wrong"</text>
  <text x="680" y="198" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">5xx  ·  logger.error + full stack trace</text>
  <text x="680" y="214" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">stack goes to pino only, not client</text>
  <text x="680" y="228" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#3fb950">✓ auto-detected, zero config</text>

  <!-- bottom note -->
  <text x="460" y="254" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">errorHandler() classifies automatically — you never configure this distinction</text>
</svg>
