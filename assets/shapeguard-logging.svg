<text x="458" y="260" font-size="10" fill="#1a4030">One JSON line per event. Machine-readable.</text>
<text x="458" y="276" font-size="10" fill="#1a4030">Ingest into Datadog / CloudWatch / Loki</text>
<text x="458" y="292" font-size="10" fill="#1a4030">directly — no parsing needed.</text>
<text x="458" y="310" font-size="10" fill="#2a5a46">Passwords, tokens, cookies always</text>
<text x="458" y="326" font-size="10" fill="#2a5a46">[REDACTED] — auto, zero config.</text>

