<svg viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Fira Code','Consolas',monospace">
<defs>
  <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0b0b14"/>
    <stop offset="100%" stop-color="#0e0e1a"/>
  </linearGradient>
  <linearGradient id="devpanel" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#09090f"/>
    <stop offset="100%" stop-color="#070712"/>
  </linearGradient>
  <linearGradient id="prodpanel" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#06100a"/>
    <stop offset="100%" stop-color="#040d07"/>
  </linearGradient>
  <pattern id="dots3" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.7" fill="#00e5a0" fill-opacity="0.05"/>
  </pattern>
  <filter id="glow3">
    <feGaussianBlur stdDeviation="2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<rect width="860" height="400" rx="12" fill="url(#bg3)"/>
<rect width="860" height="400" rx="12" fill="url(#dots3)"/>
<rect width="860" height="400" rx="12" fill="none" stroke="#1c1c2e" stroke-width="1.5"/>

<!-- header -->
<rect x="50" y="22" width="760" height="38" rx="6" fill="#0e0e1a" stroke="#1c1c2e" stroke-width="0.8"/>
<circle cx="68" cy="41" r="4.5" fill="#00e5a0" filter="url(#glow3)"/>
<text x="82" y="46" font-size="13" fill="#00e5a0" font-weight="600" letter-spacing="0.5">Built-in structured logging — zero config</text>
<text x="800" y="46" text-anchor="end" font-size="10" fill="#252540" letter-spacing="1">auto-detected from NODE_ENV</text>

