<svg width="920" height="240" viewBox="0 0 920 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#30363d"/>
    </marker>
  </defs>

  <rect width="920" height="240" fill="url(#bg)" rx="14"/>
  <rect width="920" height="240" fill="none" stroke="#21262d" stroke-width="1" rx="14"/>

  <text x="460" y="28" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="500" fill="#8b949e" letter-spacing="2">generateOpenAPI() — ONE source of truth, always in sync</text>

  <!-- step 1: defineRoute -->
  <rect x="32" y="44" width="220" height="164" rx="10" fill="#0e1c0e" stroke="#3fb950" stroke-width="1"/>
  <rect x="32" y="44" width="220" height="3" rx="2" fill="#3fb950"/>
  <text x="142" y="65" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="700" fill="#56d364">defineRoute()</text>
  <text x="52" y="86" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#6e7681">defineRoute({</text>
  <text x="62" y="102" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#6e7681">  body: CreateUserDTO,</text>
  <text x="62" y="118" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#6e7681">  response: UserSchema,</text>
  <text x="62" y="134" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" font-weight="700" fill="#56d364">  tags: ['users'],</text>
  <text x="62" y="150" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" font-weight="700" fill="#56d364">  summary: 'Create user',</text>
  <text x="62" y="166" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" font-weight="700" fill="#56d364">  operationId: 'createUser'</text>
  <text x="52" y="182" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#6e7681">})</text>
  <text x="142" y="200" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" fill="#484f58">schema IS the spec</text>

  <line x1="254" y1="126" x2="284" y2="126" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- step 2: generateOpenAPI box -->
  <rect x="286" y="88" width="180" height="76" rx="10" fill="#0d1f38" stroke="#388bfd" stroke-width="1.5"/>
  <text x="376" y="116" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700" fill="#79c0ff">generateOpenAPI()</text>
  <text x="376" y="134" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">reads Zod schemas</text>
  <text x="376" y="150" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">builds spec auto</text>

  <line x1="468" y1="126" x2="498" y2="126" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- step 3: spec output -->
  <rect x="500" y="44" width="196" height="164" rx="10" fill="#161b22" stroke="#388bfd" stroke-width="1"/>
  <rect x="500" y="44" width="196" height="3" rx="2" fill="#388bfd"/>
  <text x="598" y="65" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="700" fill="#79c0ff">OpenAPI 3.1 spec</text>
  <text x="518" y="86" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#6e7681">openapi: 3.1.0</text>
  <text x="518" y="102" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#6e7681">paths:</text>
  <text x="526" y="118" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#6e7681">/users:</text>
  <text x="534" y="134" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#6e7681">  post:</text>
  <text x="542" y="150" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#79c0ff">    tags: [users]</text>
  <text x="542" y="166" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#79c0ff">    summary: Create user</text>
  <text x="542" y="182" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#6e7681">    requestBody: …</text>
  <text x="542" y="198" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#6e7681">    responses: …</text>

  <line x1="698" y1="126" x2="728" y2="126" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- step 4: swagger ui -->
  <rect x="730" y="80" width="158" height="92" rx="10" fill="#0e1c0e" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="730" y="80" width="158" height="3" rx="2" fill="#3fb950"/>
  <text x="809" y="106" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700" fill="#56d364">Swagger UI</text>
  <text x="809" y="124" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">app.get('/docs',</text>
  <text x="809" y="140" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">  swaggerUi(spec))</text>
  <text x="809" y="158" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#3fb950">served instantly</text>

  <!-- bottom warning -->
  <rect x="32" y="218" width="856" height="14" rx="4" fill="#1c1105" stroke="#d29922" stroke-width="0.5"/>
  <text x="460" y="228" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#e3b341">Change your Zod schema → docs update automatically · Zero JSDoc · Zero drift</text>
</svg>
