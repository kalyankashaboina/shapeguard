<svg width="920" height="240" viewBox="0 0 920 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect width="920" height="240" fill="url(#bg)" rx="14"/>
  <rect width="920" height="240" fill="none" stroke="#21262d" stroke-width="1" rx="14"/>

  <text x="460" y="28" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="500" fill="#8b949e" letter-spacing="2">PER-ROUTE RATE LIMITING — built into defineRoute()</text>

  <!-- LEFT: old way -->
  <rect x="32" y="44" width="418" height="182" rx="10" fill="#1c0808" stroke="#f85149" stroke-width="1"/>
  <rect x="32" y="44" width="418" height="3" rx="2" fill="#f85149"/>
  <text x="55" y="66" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700" fill="#ff7b72">Without shapeguard</text>
  <text x="225" y="66" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e"> — 3 separate steps every route</text>

  <rect x="52" y="76" width="378" height="36" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="62" y="90" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#484f58">1 </text>
  <text x="76" y="90" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#ff7b72">npm install express-rate-limit</text>
  <text x="76" y="104" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">separate package, not in your route definition</text>

  <rect x="52" y="120" width="378" height="48" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="62" y="136" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#484f58">2 </text>
  <text x="76" y="136" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#ff7b72">const loginLimit = rateLimit({ windowMs, max })</text>
  <text x="76" y="152" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">separate instance per route — different variable every time</text>
  <text x="76" y="164" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">no retryAfter · no Redis without extra config</text>

  <rect x="52" y="176" width="378" height="36" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="62" y="190" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#484f58">3 </text>
  <text x="76" y="190" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#ff7b72">app.post('/login', loginLimit, handler)</text>
  <text x="76" y="204" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">apply manually to every route that needs it</text>

  <!-- RIGHT: shapeguard way -->
  <rect x="470" y="44" width="418" height="182" rx="10" fill="#0e1c0e" stroke="#3fb950" stroke-width="1"/>
  <rect x="470" y="44" width="418" height="3" rx="2" fill="#3fb950"/>
  <text x="493" y="66" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700" fill="#56d364">With shapeguard</text>
  <text x="617" y="66" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e"> — inside defineRoute()</text>

  <rect x="490" y="76" width="378" height="136" rx="6" fill="#010409" stroke="#21262d" stroke-width="0.5"/>
  <!-- dots -->
  <circle cx="506" cy="90" r="4" fill="#f85149"/>
  <circle cx="520" cy="90" r="4" fill="#e3b341"/>
  <circle cx="534" cy="90" r="4" fill="#3fb950"/>
  <text x="490" y="108" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#6e7681">  defineRoute({</text>
  <text x="490" y="123" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#6e7681">    body: CreateUserDTO,</text>
  <text x="490" y="138" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" font-weight="700" fill="#56d364">    rateLimit: {</text>
  <text x="490" y="153" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#7ee787">      windowMs: 60_000,  max: 10,</text>
  <text x="490" y="168" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#7ee787">      store: redisStore,       </text>
  <text x="700" y="168" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#56d364">← Redis ready</text>
  <text x="490" y="183" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#7ee787">      keyGenerator: (req) => req.user?.id</text>
  <text x="490" y="198" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" font-weight="700" fill="#56d364">    }</text>
  <text x="490" y="207" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#6e7681">  })</text>

  <!-- 429 badge bottom -->
  <text x="460" y="234" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">429 auto-includes retryAfter seconds · same { success: false, error: { code: 'RATE_LIMIT_EXCEEDED' } } shape as everything else</text>
</svg>
