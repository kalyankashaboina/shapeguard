  <text x="112" y="157" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#22d3ee">[DEBUG]</text>
  <text x="170" y="157" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#6e7681">  &gt;&gt;  POST    /api/v1/users               </text>
  <text x="530" y="157" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#388bfd">[req_019ce57088b6...]</text>

  <text x="52" y="175" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#484f58">09:44:57  </text>
  <text x="112" y="175" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#3fb950">[INFO] </text>
  <text x="170" y="175" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#6e7681">  &lt;&lt;  201  POST    /api/v1/users     2ms   </text>
  <text x="530" y="175" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#388bfd">[req_019ce57088b6...]</text>

  <text x="52" y="193" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#484f58">09:44:59  </text>
  <text x="112" y="193" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#f85149">[ERROR]</text>
  <text x="170" y="193" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#6e7681">  &lt;&lt;  500  GET     /api/v1/crash     1ms   </text>
  <text x="530" y="193" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#388bfd">[req_019ce57088b6...]</text>
  <text x="748" y="193" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#f85149"> ← grep → full trace</text>

  <text x="52" y="211" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#484f58">09:44:58  </text>
  <text x="112" y="211" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#e3b341">[WARN] </text>
  <text x="170" y="211" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#6e7681">  &lt;&lt;  200  GET     /api/v1/data   1523ms  </text>
  <text x="530" y="211" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#388bfd">[req_019ce57088b6...]  </text>
  <text x="748" y="211" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#e3b341">SLOW</text>
</svg>
