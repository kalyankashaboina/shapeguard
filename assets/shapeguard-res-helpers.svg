<svg width="920" height="240" viewBox="0 0 920 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect width="920" height="240" fill="url(#bg)" rx="14"/>
  <rect width="920" height="240" fill="none" stroke="#21262d" stroke-width="1" rx="14"/>

  <text x="460" y="28" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="500" fill="#8b949e" letter-spacing="2">RESPONSE HELPERS — injected on every route by shapeguard()</text>

  <!-- res.ok -->
  <rect x="32" y="44" width="148" height="118" rx="10" fill="#161b22" stroke="#388bfd" stroke-width="1"/>
  <rect x="32" y="44" width="148" height="3" rx="2" fill="#388bfd"/>
  <text x="106" y="70" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700" fill="#79c0ff">res.ok()</text>
  <text x="106" y="96" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="28" font-weight="800" fill="#388bfd">200</text>
  <text x="106" y="118" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">General success</text>
  <text x="106" y="133" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">status override ok</text>

  <!-- res.created -->
  <rect x="196" y="44" width="148" height="118" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <rect x="196" y="44" width="148" height="3" rx="2" fill="#3fb950"/>
  <text x="270" y="70" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700" fill="#56d364">res.created()</text>
  <text x="270" y="96" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="28" font-weight="800" fill="#3fb950">201</text>
  <text x="270" y="118" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">Resource created</text>
  <text x="270" y="133" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">always 201</text>

  <!-- res.accepted -->
  <rect x="360" y="44" width="148" height="118" rx="10" fill="#161b22" stroke="#8957e5" stroke-width="1"/>
  <rect x="360" y="44" width="148" height="3" rx="2" fill="#8957e5"/>
  <text x="434" y="70" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700" fill="#d2a8ff">res.accepted()</text>
  <text x="434" y="96" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="28" font-weight="800" fill="#8957e5">202</text>
  <text x="434" y="118" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">Async job queued</text>
  <text x="434" y="133" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">exports · emails</text>

  <!-- res.noContent -->
  <rect x="524" y="44" width="148" height="118" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="524" y="44" width="148" height="3" rx="2" fill="#484f58"/>
  <text x="598" y="70" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="700" fill="#8b949e">res.noContent()</text>
  <text x="598" y="96" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="28" font-weight="800" fill="#484f58">204</text>
  <text x="598" y="118" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">No body</text>
  <text x="598" y="133" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">DELETE responses</text>

  <!-- res.paginated -->
  <rect x="688" y="44" width="200" height="118" rx="10" fill="#161b22" stroke="#d29922" stroke-width="1"/>
  <rect x="688" y="44" width="200" height="3" rx="2" fill="#d29922"/>
  <text x="788" y="70" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700" fill="#e3b341">res.paginated()</text>
  <text x="788" y="96" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="28" font-weight="800" fill="#d29922">200</text>
  <text x="788" y="118" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">List + pagination</text>
  <text x="788" y="133" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">pages auto-calculated</text>

  <!-- res.fail - full width bottom -->
  <rect x="32" y="178" width="856" height="48" rx="10" fill="#1c0808" stroke="#f85149" stroke-width="1"/>
  <rect x="32" y="178" width="856" height="3" rx="2" fill="#f85149"/>
  <text x="120" y="200" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700" fill="#ff7b72">res.fail()</text>
  <text x="120" y="217" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#f85149">400 default</text>
  <line x1="195" y1="184" x2="195" y2="220" stroke="#30363d" stroke-width="1"/>
  <text x="540" y="197" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" fill="#8b949e">res.fail({ code: 'INVALID_COUPON', message: 'Coupon expired', status: 400 })</text>
  <text x="540" y="213" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">send error without throwing — use when you need inline conditional errors</text>
</svg>
