<svg viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Fira Code','Consolas',monospace">
<defs>
  <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0b0b14"/>
    <stop offset="100%" stop-color="#0e0e1a"/>
  </linearGradient>
  <linearGradient id="successGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#041209"/>
    <stop offset="100%" stop-color="#030d07"/>
  </linearGradient>
  <linearGradient id="errorGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#130808"/>
    <stop offset="100%" stop-color="#0d0606"/>
  </linearGradient>
  <pattern id="dots2" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.7" fill="#00e5a0" fill-opacity="0.06"/>
  </pattern>
  <filter id="glow2">
    <feGaussianBlur stdDeviation="2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- background -->
<rect width="860" height="420" rx="12" fill="url(#bg2)"/>
<rect width="860" height="420" rx="12" fill="url(#dots2)"/>
<rect width="860" height="420" rx="12" fill="none" stroke="#1c1c2e" stroke-width="1.5"/>

<!-- header -->
<rect x="50" y="22" width="760" height="38" rx="6" fill="#0e0e1a" stroke="#1c1c2e" stroke-width="0.8"/>
<circle cx="68" cy="41" r="4.5" fill="#00e5a0" filter="url(#glow2)"/>
<text x="82" y="46" font-size="13" fill="#00e5a0" font-weight="600" letter-spacing="0.5">Response shapes — always consistent</text>
<text x="800" y="46" text-anchor="end" font-size="10" fill="#252540" letter-spacing="1">shapeguard v0.3.0</text>

<!-- frontend note -->
<rect x="50" y="72" width="760" height="22" rx="4" fill="#0a0a10" stroke="#252540" stroke-width="0.6"/>
<text x="430" y="87" text-anchor="middle" font-size="11" fill="#3a3a56">Frontend writes ONE handler for both success and error — forever. No more per-route shapes.</text>

<!-- ── SUCCESS PANEL ── -->
<rect x="50" y="106" width="370" height="184" rx="6" fill="url(#successGrad)" stroke="#00e5a0" stroke-width="0.8" stroke-opacity="0.5"/>
<!-- header strip -->
<rect x="50" y="106" width="370" height="26" rx="6" fill="#00e5a0" fill-opacity="0.12"/>
<circle cx="68" cy="119" r="4" fill="#00e5a0" fill-opacity="0.8"/>
<text x="80" y="124" font-size="11" fill="#00e5a0" font-weight="600" letter-spacing="0.5">SUCCESS RESPONSE</text>
<text x="408" y="124" text-anchor="end" font-size="10" fill="#0f6e56">2xx</text>

<!-- success json -->
<text x="68" y="150" font-size="12" fill="#4a4a6a">{</text>
<text x="84" y="168" font-size="12" fill="#a8d1f0">  "success"</text><text x="158" y="168" font-size="12" fill="#e8e8ff">: </text><text x="172" y="168" font-size="12" fill="#ffc84a">true</text><text x="200" y="168" font-size="12" fill="#4a4a6a">,</text>
<text x="84" y="186" font-size="12" fill="#a8d1f0">  "message"</text><text x="158" y="186" font-size="12" fill="#e8e8ff">: </text><text x="172" y="186" font-size="12" fill="#8ec07c">"User created"</text><text x="293" y="186" font-size="12" fill="#4a4a6a">,</text>
<text x="84" y="204" font-size="12" fill="#a8d1f0">  "data"</text><text x="131" y="204" font-size="12" fill="#e8e8ff">: {</text>
<text x="100" y="220" font-size="12" fill="#a8d1f0">    "id"</text><text x="129" y="220" font-size="12" fill="#e8e8ff">: </text><text x="143" y="220" font-size="12" fill="#8ec07c">"550e..."</text><text x="199" y="220" font-size="12" fill="#4a4a6a">,</text>
<text x="100" y="236" font-size="12" fill="#a8d1f0">    "email"</text><text x="145" y="236" font-size="12" fill="#e8e8ff">: </text><text x="159" y="236" font-size="12" fill="#8ec07c">"alice@..."</text>
<text x="84" y="252" font-size="12" fill="#e8e8ff">  }</text>
<text x="68" y="270" font-size="12" fill="#4a4a6a">}</text>
<!-- passwordHash note -->
<rect x="60" y="276" width="350" height="10" rx="2" fill="#00e5a0" fill-opacity="0.06"/>
<text x="430" y="284" text-anchor="end" font-size="9.5" fill="#1a4030">passwordHash absent — auto-stripped by response schema ✓</text>

<!-- ── ERROR PANEL ── -->
<rect x="440" y="106" width="370" height="184" rx="6" fill="url(#errorGrad)" stroke="#ff3b3b" stroke-width="0.8" stroke-opacity="0.5"/>
<rect x="440" y="106" width="370" height="26" rx="6" fill="#ff3b3b" fill-opacity="0.12"/>
<circle cx="458" cy="119" r="4" fill="#ff3b3b" fill-opacity="0.8"/>
<text x="470" y="124" font-size="11" fill="#ff7070" font-weight="600" letter-spacing="0.5">ERROR RESPONSE</text>
<text x="798" y="124" text-anchor="end" font-size="10" fill="#5a2020">4xx / 5xx</text>

<!-- error json -->
<text x="458" y="150" font-size="12" fill="#4a4a6a">{</text>
<text x="474" y="168" font-size="12" fill="#a8d1f0">  "success"</text><text x="548" y="168" font-size="12" fill="#e8e8ff">: </text><text x="562" y="168" font-size="12" fill="#ff8585">false</text><text x="592" y="168" font-size="12" fill="#4a4a6a">,</text>
<text x="474" y="186" font-size="12" fill="#a8d1f0">  "message"</text><text x="548" y="186" font-size="12" fill="#e8e8ff">: </text><text x="562" y="186" font-size="12" fill="#8ec07c">"Email already exists"</text><text x="710" y="186" font-size="12" fill="#4a4a6a">,</text>
<text x="474" y="204" font-size="12" fill="#a8d1f0">  "error"</text><text x="521" y="204" font-size="12" fill="#e8e8ff">: {</text>
<text x="490" y="220" font-size="12" fill="#a8d1f0">    "code"</text><text x="532" y="220" font-size="12" fill="#e8e8ff">: </text><text x="546" y="220" font-size="12" fill="#8ec07c">"CONFLICT"</text><text x="618" y="220" font-size="12" fill="#4a4a6a">,</text>
<text x="490" y="236" font-size="12" fill="#a8d1f0">    "message"</text><text x="549" y="236" font-size="12" fill="#8ec07c">"Email already exists"</text>
<text x="474" y="252" font-size="12" fill="#e8e8ff">  }</text>
<text x="458" y="270" font-size="12" fill="#4a4a6a">}</text>
<rect x="450" y="276" width="350" height="10" rx="2" fill="#ff3b3b" fill-opacity="0.06"/>
<text x="798" y="284" text-anchor="end" font-size="9.5" fill="#4a1a1a">DB crash message hidden in prod — "Something went wrong" shown ✓</text>

<!-- ── FRONTEND HANDLER ── -->
<rect x="50" y="306" width="760" height="66" rx="6" fill="#0a0a10" stroke="#252540" stroke-width="0.8"/>
<rect x="50" y="306" width="760" height="20" rx="6" fill="#1c1c2e" fill-opacity="0.5"/>
<text x="80" y="320" font-size="10" fill="#3a3a56" letter-spacing="1">FRONTEND — one handler, forever</text>

<text x="68" y="342" font-size="12" fill="#c792ea">const </text><text x="103" y="342" font-size="12" fill="#e8e8ff">{ success, data, error } = response.data</text>
<text x="68" y="360" font-size="12" fill="#c792ea">if </text><text x="84" y="360" font-size="12" fill="#e8e8ff">(!success) </text><text x="150" y="360" font-size="12" fill="#80ffcc">handleError</text><text x="220" y="360" font-size="12" fill="#e8e8ff">(error.code, error.message)</text>
<text x="580" y="360" font-size="11" fill="#1a4030">// works for EVERY route ✓</text>

<!-- footer line -->
<line x1="50" y1="390" x2="810" y2="390" stroke="#1c1c2e" stroke-width="0.8"/>
<circle cx="50"  cy="390" r="2" fill="#ff3b3b" fill-opacity="0.5"/>
<circle cx="810" cy="390" r="2" fill="#00e5a0" fill-opacity="0.5"/>
<text x="430" y="406" text-anchor="middle" font-size="9" fill="#1c1c2e" letter-spacing="1">shapeguard · npmjs.com/package/shapeguard</text>
</svg>
