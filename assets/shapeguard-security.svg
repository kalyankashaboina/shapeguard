<svg viewBox="0 0 860 370" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Fira Code','Consolas',monospace">
<defs>
  <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0b0b14"/>
    <stop offset="100%" stop-color="#0e0e1a"/>
  </linearGradient>
  <pattern id="dots4" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.7" fill="#00e5a0" fill-opacity="0.05"/>
  </pattern>
  <filter id="glow4">
    <feGaussianBlur stdDeviation="2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<rect width="860" height="370" rx="12" fill="url(#bg4)"/>
<rect width="860" height="370" rx="12" fill="url(#dots4)"/>
<rect width="860" height="370" rx="12" fill="none" stroke="#1c1c2e" stroke-width="1.5"/>

<!-- header -->
<rect x="50" y="22" width="760" height="38" rx="6" fill="#0e0e1a" stroke="#1c1c2e" stroke-width="0.8"/>
<circle cx="68" cy="41" r="4.5" fill="#00e5a0" filter="url(#glow4)"/>
<text x="82" y="46" font-size="13" fill="#00e5a0" font-weight="600" letter-spacing="0.5">Security defaults — always on, zero config</text>
<text x="800" y="46" text-anchor="end" font-size="10" fill="#252540" letter-spacing="1">shapeguard v0.3.0</text>

<!-- table header row -->
<rect x="50" y="74" width="760" height="24" rx="4" fill="#1c1c2e"/>
<text x="76"  y="90" font-size="10" fill="#4a4a6a" letter-spacing="1.2">THREAT</text>
<text x="330" y="90" font-size="10" fill="#4a4a6a" letter-spacing="1.2">DEFAULT BEHAVIOUR</text>
<text x="600" y="90" font-size="10" fill="#4a4a6a" letter-spacing="1.2">CONFIGURABLE</text>
<text x="756" y="90" font-size="10" fill="#4a4a6a" letter-spacing="1.2">STATUS</text>

<!-- rows -->
<!-- row helper: alternating bg at y, text items -->
<!-- row 1: proto pollution -->
<rect x="50" y="98" width="760" height="26" rx="0" fill="#0d0d1a"/>
<text x="76"  y="115" font-size="11.5" fill="#e8e8ff">Proto pollution  </text><text x="198" y="115" font-size="11" fill="#3a3a56">(__proto__, constructor)</text>
<text x="330" y="115" font-size="11.5" fill="#80ffcc">Stripped — always blocked</text>
<text x="600" y="115" font-size="11.5" fill="#3a5a46">No</text>
<rect x="740" y="103" width="60" height="16" rx="3" fill="#041209" stroke="#00e5a0" stroke-width="0.6"/>
<text x="770" y="115" text-anchor="middle" font-size="10" fill="#00e5a0" font-weight="600">ALWAYS ON</text>

<!-- row 2: unicode injection -->
<rect x="50" y="124" width="760" height="26" rx="0" fill="#0a0a14"/>
<text x="76"  y="141" font-size="11.5" fill="#e8e8ff">Unicode injection  </text><text x="204" y="141" font-size="11" fill="#3a3a56">(null bytes, RTL override)</text>
<text x="330" y="141" font-size="11.5" fill="#80ffcc">Stripped — always cleaned</text>
<text x="600" y="141" font-size="11.5" fill="#3a5a46">No</text>
<rect x="740" y="129" width="60" height="16" rx="3" fill="#041209" stroke="#00e5a0" stroke-width="0.6"/>
<text x="770" y="141" text-anchor="middle" font-size="10" fill="#00e5a0" font-weight="600">ALWAYS ON</text>

<!-- row 3: depth dos -->
<rect x="50" y="150" width="760" height="26" rx="0" fill="#0d0d1a"/>
<text x="76"  y="167" font-size="11.5" fill="#e8e8ff">Object depth DoS</text>
<text x="330" y="167" font-size="11.5" fill="#ffc84a">20 levels max</text>
<text x="600" y="167" font-size="11.5" fill="#e8e8ff">Yes — per-route or global</text>
<rect x="740" y="155" width="60" height="16" rx="3" fill="#0c0c0a" stroke="#ffc84a" stroke-width="0.6"/>
<text x="770" y="167" text-anchor="middle" font-size="10" fill="#ffc84a" font-weight="600">DEFAULT</text>

<!-- row 4: array size dos -->
<rect x="50" y="176" width="760" height="26" rx="0" fill="#0a0a14"/>
<text x="76"  y="193" font-size="11.5" fill="#e8e8ff">Array size DoS</text>
<text x="330" y="193" font-size="11.5" fill="#ffc84a">1000 items max</text>
<text x="600" y="193" font-size="11.5" fill="#e8e8ff">Yes — per-route or global</text>
<rect x="740" y="181" width="60" height="16" rx="3" fill="#0c0c0a" stroke="#ffc84a" stroke-width="0.6"/>
<text x="770" y="193" text-anchor="middle" font-size="10" fill="#ffc84a" font-weight="600">DEFAULT</text>

<!-- row 5: string size dos -->
<rect x="50" y="202" width="760" height="26" rx="0" fill="#0d0d1a"/>
<text x="76"  y="219" font-size="11.5" fill="#e8e8ff">String size DoS</text>
<text x="330" y="219" font-size="11.5" fill="#ffc84a">10,000 chars max</text>
<text x="600" y="219" font-size="11.5" fill="#e8e8ff">Yes — per-route or global</text>
<rect x="740" y="207" width="60" height="16" rx="3" fill="#0c0c0a" stroke="#ffc84a" stroke-width="0.6"/>
<text x="770" y="219" text-anchor="middle" font-size="10" fill="#ffc84a" font-weight="600">DEFAULT</text>

<!-- row 6: content-type -->
<rect x="50" y="228" width="760" height="26" rx="0" fill="#0a0a14"/>
<text x="76"  y="245" font-size="11.5" fill="#e8e8ff">Missing Content-Type</text>
<text x="330" y="245" font-size="11.5" fill="#80ffcc">415 error returned</text>
<text x="600" y="245" font-size="11.5" fill="#3a5a46">No</text>
<rect x="740" y="233" width="60" height="16" rx="3" fill="#041209" stroke="#00e5a0" stroke-width="0.6"/>
<text x="770" y="245" text-anchor="middle" font-size="10" fill="#00e5a0" font-weight="600">ALWAYS ON</text>

<!-- row 7: sensitive fields in logs -->
<rect x="50" y="254" width="760" height="26" rx="0" fill="#0d0d1a"/>
<text x="76"  y="271" font-size="11.5" fill="#e8e8ff">Sensitive fields in logs</text>
<text x="330" y="271" font-size="11.5" fill="#80ffcc">[REDACTED] automatically</text>
<text x="600" y="271" font-size="11.5" fill="#e8e8ff">Yes — add more paths</text>
<rect x="740" y="259" width="60" height="16" rx="3" fill="#041209" stroke="#00e5a0" stroke-width="0.6"/>
<text x="770" y="271" text-anchor="middle" font-size="10" fill="#00e5a0" font-weight="600">ALWAYS ON</text>

<!-- row 8: programmer errors in prod -->
<rect x="50" y="280" width="760" height="26" rx="0" fill="#0a0a14"/>
<text x="76"  y="297" font-size="11.5" fill="#e8e8ff">Programmer errors in prod</text>
<text x="330" y="297" font-size="11.5" fill="#80ffcc">"Something went wrong" shown</text>
<text x="600" y="297" font-size="11.5" fill="#e8e8ff">Yes — fallbackMessage</text>
<rect x="740" y="285" width="60" height="16" rx="3" fill="#041209" stroke="#00e5a0" stroke-width="0.6"/>
<text x="770" y="297" text-anchor="middle" font-size="10" fill="#00e5a0" font-weight="600">ALWAYS ON</text>

<!-- table bottom border -->
<rect x="50" y="306" width="760" height="1" fill="#1c1c2e"/>

<!-- redacted list -->
<rect x="50" y="314" width="760" height="30" rx="5" fill="#0a0a10" stroke="#1c1c2e" stroke-width="0.7"/>
<text x="76" y="324" font-size="9.5" fill="#3a3a56" letter-spacing="0.8">ALWAYS REDACTED IN LOGS:</text>
<text x="224" y="324" font-size="9.5" fill="#3a5a46">password · passwordHash · token · secret · accessToken · refreshToken · apiKey · cardNumber · cvv · ssn · pin · authorization · cookie</text>
<text x="76" y="338" font-size="9.5" fill="#252540" letter-spacing="0.5">These fields are stripped from all log output automatically. You can add more paths via the logger config.</text>

<!-- footer -->
<line x1="50" y1="356" x2="810" y2="356" stroke="#1c1c2e" stroke-width="0.8"/>
<circle cx="50"  cy="356" r="2" fill="#ff3b3b" fill-opacity="0.4"/>
<circle cx="810" cy="356" r="2" fill="#00e5a0" fill-opacity="0.4"/>
<text x="430" y="366" text-anchor="middle" font-size="9" fill="#1c1c2e" letter-spacing="1">shapeguard · npmjs.com/package/shapeguard</text>
</svg>
