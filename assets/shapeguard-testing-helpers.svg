<svg width="920" height="220" viewBox="0 0 920 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect width="920" height="220" fill="url(#bg)" rx="14"/>
  <rect width="920" height="220" fill="none" stroke="#21262d" stroke-width="1" rx="14"/>

  <text x="460" y="28" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="500" fill="#8b949e" letter-spacing="2">TESTING HELPERS — unit test controllers without running Express</text>

  <!-- LEFT: without -->
  <rect x="32" y="44" width="418" height="164" rx="10" fill="#1c0808" stroke="#f85149" stroke-width="1"/>
  <rect x="32" y="44" width="418" height="3" rx="2" fill="#f85149"/>
  <text x="55" y="66" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700" fill="#ff7b72">Without shapeguard</text>
  <text x="55" y="82" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">need supertest + full Express app just to test a handler</text>

  <rect x="52" y="92" width="378" height="104" rx="6" fill="#010409" stroke="#21262d" stroke-width="0.5"/>
  <circle cx="68" cy="106" r="4" fill="#f85149"/><circle cx="82" cy="106" r="4" fill="#e3b341"/><circle cx="96" cy="106" r="4" fill="#3fb950"/>
  <text x="52" y="122" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#484f58">  const app = express()</text>
  <text x="52" y="138" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#484f58">  app.use(express.json())</text>
  <text x="52" y="154" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#f85149">  app.post('/users', handler)</text>
  <text x="52" y="170" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#f85149">  const res = await request(app).post('/users')</text>
  <text x="52" y="186" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#f85149">    .send({ email: 'alice@example.com' })</text>

  <text x="241" y="208" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#f85149">real HTTP · full app · slow · heavy</text>

  <!-- RIGHT: with shapeguard -->
  <rect x="470" y="44" width="418" height="164" rx="10" fill="#0e1c0e" stroke="#3fb950" stroke-width="1"/>
  <rect x="470" y="44" width="418" height="3" rx="2" fill="#3fb950"/>
  <text x="493" y="66" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700" fill="#56d364">With shapeguard</text>
  <text x="493" y="82" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">import helpers from 'shapeguard/testing' — done</text>

  <rect x="490" y="92" width="378" height="104" rx="6" fill="#010409" stroke="#21262d" stroke-width="0.5"/>
  <circle cx="506" cy="106" r="4" fill="#f85149"/><circle cx="520" cy="106" r="4" fill="#e3b341"/><circle cx="534" cy="106" r="4" fill="#3fb950"/>
  <text x="490" y="122" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#6e7681">  import { mockRequest, mockResponse, mockNext }</text>
  <text x="490" y="138" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#6e7681">    from 'shapeguard/testing'</text>
  <text x="490" y="154" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#56d364">  const req = mockRequest({ body: { email: '…' } })</text>
  <text x="490" y="170" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#56d364">  const res = mockResponse()   // has all res.ok etc.</text>
  <text x="490" y="186" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#56d364">  expect(res.created).toHaveBeenCalled()</text>

  <text x="679" y="208" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#3fb950">no HTTP · no Express · no supertest · pure unit test</text>
</svg>
