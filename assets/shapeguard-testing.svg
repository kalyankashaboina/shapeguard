<svg width="720" height="360" viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="720" height="360" rx="14" fill="#0D1117"/>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#1A8F3A"/></marker>
    <marker id="b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#CC3333"/></marker>
  </defs>

  <!-- Title -->
  <text x="360" y="34" text-anchor="middle" font-size="14" font-weight="700" fill="#E8FFE8">shapeguard/testing — unit-test controllers without HTTP</text>

  <!-- Without label -->
  <rect x="30" y="50" width="320" height="268" rx="10" fill="#1A0808" stroke="#CC3333" stroke-width="1.5"/>
  <rect x="30" y="50" width="320" height="28" rx="10" fill="#882222"/>
  <rect x="30" y="64" width="320" height="14" fill="#882222"/>
  <text x="190" y="69" text-anchor="middle" font-size="11" font-weight="700" fill="#FFF">❌ Without shapeguard/testing</text>
  <text x="44" y="96" font-size="8" fill="#FF8888" font-family="monospace">// Needs full Express app + HTTP</text>
  <text x="44" y="112" font-size="8" fill="#CC6666" font-family="monospace">import supertest from 'supertest'</text>
  <text x="44" y="126" font-size="8" fill="#CC6666" font-family="monospace">const app = express()</text>
  <text x="44" y="140" font-size="8" fill="#CC6666" font-family="monospace">app.use(express.json())</text>
  <text x="44" y="154" font-size="8" fill="#CC6666" font-family="monospace">app.use(shapeguard())</text>
  <text x="44" y="168" font-size="8" fill="#CC6666" font-family="monospace">app.post('/users', ...createUser)</text>
  <text x="44" y="182" font-size="8" fill="#CC6666" font-family="monospace">app.use(errorHandler())</text>
  <text x="44" y="196" font-size="8" fill="#CC6666" font-family="monospace">// Then make HTTP request</text>
  <text x="44" y="210" font-size="8" fill="#CC6666" font-family="monospace">const res = await supertest(app)</text>
  <text x="44" y="224" font-size="8" fill="#CC6666" font-family="monospace">  .post('/users')</text>
  <text x="44" y="238" font-size="8" fill="#CC6666" font-family="monospace">  .set('Content-Type','application/json')</text>
  <text x="44" y="252" font-size="8" fill="#CC6666" font-family="monospace">  .send({ email: 'alice@example.com' })</text>
  <text x="44" y="266" font-size="8" fill="#CC6666" font-family="monospace">expect(res.status).toBe(201)</text>
  <text x="44" y="294" font-size="8" fill="#882222">Slow · Full stack · Hard to isolate</text>

  <!-- With label -->
  <rect x="370" y="50" width="320" height="268" rx="10" fill="#081A08" stroke="#1A8F3A" stroke-width="1.5"/>
  <rect x="370" y="50" width="320" height="28" rx="10" fill="#1A6A2A"/>
  <rect x="370" y="64" width="320" height="14" fill="#1A6A2A"/>
  <text x="530" y="69" text-anchor="middle" font-size="11" font-weight="700" fill="#FFF">✅ With shapeguard/testing</text>
  <text x="384" y="96" font-size="8" fill="#90FF90" font-family="monospace">import { mockRequest, mockResponse,</text>
  <text x="384" y="110" font-size="8" fill="#90FF90" font-family="monospace">  mockNext } from 'shapeguard/testing'</text>
  <text x="384" y="130" font-size="8" fill="#60C060" font-family="monospace">// No app. No HTTP. Pure unit test.</text>
  <text x="384" y="146" font-size="8" fill="#90FF90" font-family="monospace">const req = mockRequest({</text>
  <text x="384" y="160" font-size="8" fill="#90FF90" font-family="monospace">  body: { email: 'alice@example.com' }</text>
  <text x="384" y="174" font-size="8" fill="#90FF90" font-family="monospace">})</text>
  <text x="384" y="188" font-size="8" fill="#90FF90" font-family="monospace">const res  = mockResponse()</text>
  <text x="384" y="202" font-size="8" fill="#90FF90" font-family="monospace">const next = mockNext()</text>
  <text x="384" y="218" font-size="8" fill="#90FF90" font-family="monospace">// [1] = handler (skip validate in unit test)</text>
  <text x="384" y="232" font-size="8" fill="#7ADF7A" font-family="monospace">await createUser[1](req, res, next)</text>
  <text x="384" y="252" font-size="8" fill="#90FF90" font-family="monospace">expect(next.error).toBeUndefined()</text>
  <text x="384" y="266" font-size="8" fill="#90FF90" font-family="monospace">expect(res._result().statusCode).toBe(201)</text>
  <text x="384" y="294" font-size="8" fill="#1A6A2A">Fast · Isolated · No network needed</text>

  <!-- Bottom note -->
  <rect x="30" y="328" width="660" height="24" rx="6" fill="#0A1A0A" stroke="#1A5A2A" stroke-width="1"/>
  <text x="360" y="344" text-anchor="middle" font-size="9" fill="#60A060">mockResponse() captures: statusCode · body · headers · ended — all accessible via res._result()</text>
</svg>
