<svg width="920" height="180" viewBox="0 0 920 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow-teal">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#30363d"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="920" height="180" fill="url(#bg)" rx="14"/>
  <rect width="920" height="180" fill="none" stroke="#21262d" stroke-width="1" rx="14"/>

  <!-- top label -->
  <text x="460" y="28" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="500" fill="#8b949e" letter-spacing="2">REQUEST PIPELINE</text>

  <!-- Step 1: Request -->
  <rect x="32" y="48" width="130" height="88" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="32" y="48" width="130" height="3" rx="2" fill="#30363d"/>
  <text x="97" y="86" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700" fill="#e6edf3">Request</text>
  <text x="97" y="103" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">POST /users</text>
  <text x="97" y="118" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">arrives</text>

  <!-- arrow 1 -->
  <line x1="164" y1="92" x2="194" y2="92" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Pre-parse guards -->
  <rect x="196" y="48" width="145" height="88" rx="10" fill="#161b22" stroke="#d29922" stroke-width="1"/>
  <rect x="196" y="48" width="145" height="3" rx="2" fill="#d29922"/>
  <text x="268" y="82" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700" fill="#f0883e">Pre-parse</text>
  <text x="268" y="97" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="600" fill="#e3b341">guards</text>
  <text x="268" y="114" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#8b949e">proto · depth · size</text>
  <text x="268" y="152" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" fill="#f85149">→ 400 on threat</text>

  <!-- arrow 2 -->
  <line x1="343" y1="92" x2="373" y2="92" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: Zod validate -->
  <rect x="375" y="48" width="145" height="88" rx="10" fill="#161b22" stroke="#388bfd" stroke-width="1"/>
  <rect x="375" y="48" width="145" height="3" rx="2" fill="#388bfd"/>
  <text x="447" y="82" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700" fill="#79c0ff">Zod validate</text>
  <text x="447" y="97" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">body · params</text>
  <text x="447" y="111" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">query · headers</text>
  <text x="447" y="152" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" fill="#f85149">→ 422 on invalid</text>

  <!-- arrow 3 -->
  <line x1="522" y1="92" x2="552" y2="92" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: transform -->
  <rect x="554" y="48" width="140" height="88" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <rect x="554" y="48" width="140" height="3" rx="2" fill="#3fb950"/>
  <text x="624" y="82" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700" fill="#56d364">transform()</text>
  <text x="624" y="97" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">hash · slug · enrich</text>
  <text x="624" y="111" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">runs async</text>
  <text x="624" y="152" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" fill="#3fb950">→ optional</text>

  <!-- arrow 4 -->
  <line x1="696" y1="92" x2="726" y2="92" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5: Your handler (highlighted) -->
  <rect x="728" y="38" width="158" height="108" rx="10" fill="#0d1117" stroke="#8957e5" stroke-width="1.5"/>
  <rect x="728" y="38" width="158" height="3" rx="2" fill="#8957e5"/>
  <text x="807" y="74" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700" fill="#d2a8ff">Your handler</text>
  <text x="807" y="92" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#56d364">✓ req.body typed</text>
  <text x="807" y="107" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#56d364">✓ unknowns stripped</text>
  <text x="807" y="122" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#56d364">✓ response schema</text>
</svg>
