<svg width="920" height="220" viewBox="0 0 920 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect width="920" height="220" fill="url(#bg)" rx="14"/>
  <rect width="920" height="220" fill="none" stroke="#21262d" stroke-width="1" rx="14"/>

  <text x="460" y="28" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="500" fill="#8b949e" letter-spacing="2">withShape() — per-route override · global envelope unchanged everywhere else</text>

  <!-- LEFT: default shape -->
  <rect x="32" y="44" width="264" height="162" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="32" y="44" width="264" height="3" rx="2" fill="#484f58"/>
  <text x="164" y="65" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="700" fill="#8b949e">Default envelope</text>
  <text x="164" y="80" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">all routes unless overridden</text>
  <rect x="48" y="88" width="232" height="106" rx="6" fill="#010409" stroke="#21262d" stroke-width="0.5"/>
  <text x="56" y="106" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#6e7681">{</text>
  <text x="64" y="121" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#79c0ff">  "success"</text>
  <text x="130" y="121" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#6e7681">: true,</text>
  <text x="64" y="137" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#79c0ff">  "message"</text>
  <text x="130" y="137" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#6e7681">: "User found",</text>
  <text x="64" y="153" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#79c0ff">  "data"</text>
  <text x="106" y="153" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#6e7681">: { "id": "…" }</text>
  <text x="56" y="169" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#6e7681">}</text>
  <text x="164" y="198" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">standard for all routes</text>

  <!-- MIDDLE: health check -->
  <rect x="316" y="44" width="276" height="162" rx="10" fill="#0e1c0e" stroke="#3fb950" stroke-width="1"/>
  <rect x="316" y="44" width="276" height="3" rx="2" fill="#3fb950"/>
  <text x="454" y="65" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="700" fill="#56d364">Health check override</text>
  <text x="454" y="80" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">withShape({ ok: '{data.ok}', … })</text>
  <rect x="332" y="88" width="244" height="72" rx="6" fill="#010409" stroke="#21262d" stroke-width="0.5"/>
  <text x="340" y="106" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#56d364">withShape({</text>
  <text x="348" y="122" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#7ee787">  ok:      '{data.ok}',</text>
  <text x="348" y="138" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#7ee787">  uptime:  '{data.uptime}',</text>
  <text x="340" y="154" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#56d364">})</text>
  <rect x="332" y="168" width="244" height="28" rx="4" fill="#161b22" stroke="#3fb950" stroke-width="0.5"/>
  <text x="454" y="182" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#56d364">→ { "ok": true, "uptime": 123.4 }</text>
  <text x="454" y="198" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">no success/message/data wrapper</text>

  <!-- RIGHT: raw -->
  <rect x="612" y="44" width="276" height="162" rx="10" fill="#1c1105" stroke="#d29922" stroke-width="1"/>
  <rect x="612" y="44" width="276" height="3" rx="2" fill="#d29922"/>
  <text x="750" y="65" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="700" fill="#e3b341">Raw passthrough</text>
  <text x="750" y="80" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">withShape('raw')</text>
  <rect x="628" y="88" width="244" height="56" rx="6" fill="#010409" stroke="#21262d" stroke-width="0.5"/>
  <text x="636" y="108" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#e3b341">withShape('raw')</text>
  <text x="636" y="124" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#6e7681">res.ok({ data: 'pong' })</text>
  <text x="636" y="140" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#484f58">// → pong</text>
  <text x="750" y="163" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">Webhooks · ping routes</text>
  <text x="750" y="179" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8b949e">metrics · legacy endpoints</text>
  <text x="750" y="198" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">other routes unaffected</text>

  <text x="460" y="215" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5" fill="#484f58">withShape() applies only to the route it wraps — global envelope unchanged everywhere else</text>
</svg>
