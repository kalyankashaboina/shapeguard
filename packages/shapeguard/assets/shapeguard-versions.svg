<svg width="1000" height="380" viewBox="0 0 1000 380" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <rect width="1000" height="380" rx="14" fill="#0D1117"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#E8F5F0">shapeguard — version history</text>

  <!-- v0.1–0.5 (foundation) -->
  <rect x="20" y="54" width="148" height="300" rx="10" fill="#0F2820" stroke="#0F6E56" stroke-width="1.5"/>
  <rect x="20" y="54" width="148" height="36" rx="10" fill="#0F6E56"/>
  <rect x="20" y="76" width="148" height="14" fill="#0F6E56"/>
  <text x="94" y="77" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">v0.1 – v0.5</text>
  <text x="94" y="96" text-anchor="middle" font-size="10" fill="#7DF0C0">Foundation</text>
  <text x="34" y="118" font-size="10" fill="#A8D8C8">✦ shapeguard() middleware</text>
  <text x="34" y="136" font-size="10" fill="#A8D8C8">✦ validate() + asyncHandler()</text>
  <text x="34" y="154" font-size="10" fill="#A8D8C8">✦ AppError + errorHandler()</text>
  <text x="34" y="172" font-size="10" fill="#A8D8C8">✦ createRouter() auto-405</text>
  <text x="34" y="190" font-size="10" fill="#A8D8C8">✦ withShape() response strip</text>
  <text x="34" y="208" font-size="10" fill="#A8D8C8">✦ res.ok / created / fail</text>
  <text x="34" y="226" font-size="10" fill="#A8D8C8">✦ Zod / Joi / Yup adapters</text>
  <text x="34" y="244" font-size="10" fill="#A8D8C8">✦ pino + winston logging</text>
  <text x="34" y="262" font-size="10" fill="#A8D8C8">✦ mockRequest / mockResponse</text>
  <text x="34" y="280" font-size="10" fill="#A8D8C8">✦ defineRoute() one source</text>
  <text x="34" y="298" font-size="10" fill="#A8D8C8">✦ generateOpenAPI() 3.1</text>
  <text x="34" y="316" font-size="10" fill="#A8D8C8">✦ requestId + redaction</text>

  <!-- v0.6.0 -->
  <rect x="184" y="54" width="148" height="300" rx="10" fill="#0F1F2D" stroke="#1F6FEB" stroke-width="1.5"/>
  <rect x="184" y="54" width="148" height="36" rx="10" fill="#1F6FEB"/>
  <rect x="184" y="76" width="148" height="14" fill="#1F6FEB"/>
  <text x="258" y="77" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">v0.6.0</text>
  <text x="258" y="96" text-anchor="middle" font-size="10" fill="#79C0FF">Logger Control</text>
  <text x="198" y="118" font-size="10" fill="#A5C8F0">✦ logIncoming flag</text>
  <text x="198" y="136" font-size="10" fill="#A5C8F0">✦ shortRequestId flag</text>
  <text x="198" y="154" font-size="10" fill="#A5C8F0">✦ logClientIp flag</text>
  <text x="198" y="172" font-size="10" fill="#A5C8F0">✦ lineColor: level | method</text>
  <text x="198" y="190" font-size="10" fill="#A5C8F0">✦ zero config — defaults safe</text>

  <!-- v0.6.1 -->
  <rect x="348" y="54" width="148" height="300" rx="10" fill="#1A0E20" stroke="#A371F7" stroke-width="1.5"/>
  <rect x="348" y="54" width="148" height="36" rx="10" fill="#6E40C9"/>
  <rect x="348" y="76" width="148" height="14" fill="#6E40C9"/>
  <text x="422" y="77" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">v0.6.1</text>
  <text x="422" y="96" text-anchor="middle" font-size="10" fill="#D2A8FF">12 Bug Fixes</text>
  <text x="362" y="118" font-size="10" fill="#CBA6F7">✦ PARAM_POLLUTION → 400</text>
  <text x="362" y="136" font-size="10" fill="#CBA6F7">✦ Retry-After on 429</text>
  <text x="362" y="154" font-size="10" fill="#CBA6F7">✦ Cache set after validation</text>
  <text x="362" y="172" font-size="10" fill="#CBA6F7">✦ Rate limit per-route store</text>
  <text x="362" y="190" font-size="10" fill="#CBA6F7">✦ errorHandler auto-logger</text>
  <text x="362" y="208" font-size="10" fill="#CBA6F7">✦ sMaxAge + staleRevalidate</text>
  <text x="362" y="226" font-size="10" fill="#CBA6F7">✦ noStore discriminated union</text>

  <!-- v0.7.0 -->
  <rect x="512" y="54" width="148" height="300" rx="10" fill="#120F1F" stroke="#F78166" stroke-width="1.5"/>
  <rect x="512" y="54" width="148" height="36" rx="10" fill="#E3652B"/>
  <rect x="512" y="76" width="148" height="14" fill="#E3652B"/>
  <text x="586" y="77" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">v0.7.0</text>
  <text x="586" y="96" text-anchor="middle" font-size="10" fill="#FFA657">OpenAPI + Swagger UI</text>
  <text x="526" y="118" font-size="10" fill="#F0A070">✦ createDocs() built-in UI</text>
  <text x="526" y="136" font-size="10" fill="#F0A070">✦ dark / light / auto theme</text>
  <text x="526" y="154" font-size="10" fill="#F0A070">✦ Security schemes (bearer…)</text>
  <text x="526" y="172" font-size="10" fill="#F0A070">✦ 401/403/429 auto-responses</text>
  <text x="526" y="190" font-size="10" fill="#F0A070">✦ deprecated + externalDocs</text>
  <text x="526" y="208" font-size="10" fill="#F0A070">✦ multipart / form bodyType</text>
  <text x="526" y="226" font-size="10" fill="#F0A070">✦ CSP + X-Frame-Options</text>
  <text x="526" y="244" font-size="10" fill="#F0A070">✦ requestInterceptor hook</text>
  <text x="526" y="262" font-size="10" fill="#F0A070">✦ 40+ Zod type mappings</text>

  <!-- v0.8.0 -->
  <rect x="676" y="54" width="304" height="300" rx="10" fill="#0D1E17" stroke="#3FB950" stroke-width="2"/>
  <rect x="676" y="54" width="304" height="36" rx="10" fill="#238636"/>
  <rect x="676" y="76" width="304" height="14" fill="#238636"/>
  <text x="828" y="77" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">v0.8.0 — Enterprise Completeness</text>
  <text x="828" y="96" text-anchor="middle" font-size="10" fill="#7EE787">current release</text>

  <!-- Left col -->
  <text x="690" y="118" font-size="10" fill="#A5D9A0">✦ verifyWebhook() HMAC</text>
  <text x="690" y="136" font-size="10" fill="#A5D9A0">✦ stripe / github / shopify preset</text>
  <text x="690" y="154" font-size="10" fill="#A5D9A0">✦ replay attack protection</text>
  <text x="690" y="172" font-size="10" fill="#A5D9A0">✦ res.cursorPaginated()</text>
  <text x="690" y="190" font-size="10" fill="#A5D9A0">✦ AppError.define() typed factory</text>
  <text x="690" y="208" font-size="10" fill="#A5D9A0">✦ Docker multi-stage build</text>
  <text x="690" y="226" font-size="10" fill="#A5D9A0">✦ OpenSSF Scorecard</text>
  <!-- Right col -->
  <text x="836" y="118" font-size="10" fill="#A5D9A0">✦ auto-merge Dependabot</text>
  <text x="836" y="136" font-size="10" fill="#A5D9A0">✦ release-drafter workflow</text>
  <text x="836" y="154" font-size="10" fill="#A5D9A0">✦ coverage thresholds 85%</text>
  <text x="836" y="172" font-size="10" fill="#A5D9A0">✦ validate-release.ps1</text>
  <text x="836" y="190" font-size="10" fill="#A5D9A0">✦ CODEOWNERS + labeler</text>
  <text x="836" y="208" font-size="10" fill="#A5D9A0">✦ greet + lock workflows</text>
  <text x="836" y="226" font-size="10" fill="#A5D9A0">✦ npm provenance publish</text>
</svg>