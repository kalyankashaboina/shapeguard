# ─────────────────────────────────────────────────────────────────────────────
# sonar-project.properties — SonarCloud configuration for shapeguard
#
# Setup (one-time):
#   1. Go to https://sonarcloud.io and log in with GitHub
#   2. Import the shapeguard repository
#   3. In GitHub: Settings → Secrets → Actions → add SONAR_TOKEN
#      (copy the token SonarCloud generates during import)
#   4. Set SONAR_ORGANIZATION to your SonarCloud org key (usually your GitHub username)
#
# What SonarCloud checks:
#   - Bugs / code smells / security hotspots
#   - Coverage gate (blocks PRs below threshold)
#   - Duplication gate (blocks PRs above 3% duplication)
#   - Security vulnerabilities (OWASP / CWE mapping)
# ─────────────────────────────────────────────────────────────────────────────

sonar.projectKey=kalyankashaboina_shapeguard
sonar.organization=kalyankashaboina

sonar.projectName=shapeguard
sonar.projectVersion=0.11.0

# ── Source roots ─────────────────────────────────────────────────────────────
sonar.sources=src
sonar.exclusions=\
  src/**/__tests__/**,\
  src/**/*.test.ts,\
  src/**/*.spec.ts,\
  dist/**,\
  node_modules/**,\
  examples/**,\
  website/**

# ── Test roots ───────────────────────────────────────────────────────────────
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts,src/**/*.spec.ts

# ── Language / encoding ──────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── Coverage report (generated by vitest --coverage) ─────────────────────────
# vitest outputs lcov.info when reporter includes 'lcov'
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── TypeScript ────────────────────────────────────────────────────────────────
sonar.typescript.tsconfigPath=tsconfig.json

# ── Quality gate thresholds ──────────────────────────────────────────────────
# These are enforced in SonarCloud UI under Quality Gates.
# New code gate (applied to every PR):
#   - Coverage on new code  ≥ 80%
#   - Duplicated lines      ≤ 3%
#   - Maintainability rating A
#   - Reliability rating    A
#   - Security rating       A
#   - Security hotspots reviewed 100%
